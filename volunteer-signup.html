<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Signup | The Laboratory Theater of Florida</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" />
  <style>
    :root {
      --bg: #0f0f12;
      --card-bg: #1a1b21;
      --text: #f5f5f5;
      --muted: #b9bcc7;
      --accent: #d72638;
      --accent-2: #9f1d2a;
      --border: #333846;
      --success: #1f8f4e;
      --error: #a33131;
      --warn: #9a6b11;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.4;
    }

    main {
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem 2rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.65rem;
    }

    .sub {
      color: var(--muted);
      margin: 0 0 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 600;
      font-size: 0.92rem;
    }

    input, select, textarea {
      width: 100%;
      background: #101117;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.68rem 0.72rem;
      font: inherit;
      box-sizing: border-box;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(215, 38, 56, 0.2);
    }

    .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 0.72rem 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-2); }

    .btn-secondary {
      background: #4a4f5e;
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .notice {
      margin-top: 0.95rem;
      border-radius: 8px;
      padding: 0.75rem 0.85rem;
      font-weight: 600;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .notice.success { background: var(--success); color: #fff; }
    .notice.error { background: var(--error); color: #fff; }
    .notice.warn { background: var(--warn); color: #fff; }

    .small {
      color: var(--muted);
      font-size: 0.87rem;
      margin-top: 0.65rem;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Volunteer Signup</h1>
      <p class="sub">Create your volunteer account to access the volunteer portal.</p>

      <form id="volunteer-form" novalidate>
        <div class="grid">
          <div class="field-group">
            <label for="first_name">First Name</label>
            <input id="first_name" name="first_name" type="text" required maxlength="80" />
          </div>

          <div class="field-group">
            <label for="last_name">Last Name</label>
            <input id="last_name" name="last_name" type="text" required maxlength="80" />
          </div>

          <div class="field-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required maxlength="180" />
          </div>

          <div class="field-group">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" maxlength="40" placeholder="(555) 555-5555" />
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="8" required placeholder="Minimum 8 characters" />
          </div>

          <div class="field-group">
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" minlength="8" required placeholder="Re-enter password" />
          </div>

          <div class="field-group full">
            <label for="interests">Areas of Interest</label>
            <select id="interests" name="interests" required>
              <option value="">Select one...</option>
              <option value="front-of-house">Front of House</option>
              <option value="set-build">Set Build</option>
              <option value="costumes">Costumes</option>
              <option value="lighting-sound">Lighting / Sound</option>
              <option value="marketing">Marketing</option>
              <option value="general">General Volunteer</option>
            </select>
          </div>

          <div class="field-group full">
            <label for="availability">Availability / Notes</label>
            <textarea id="availability" name="availability" placeholder="Best days/times, experience, and anything we should know."></textarea>
          </div>
        </div>

        <div class="actions">
          <button id="submit-btn" class="btn btn-primary" type="submit">Create Volunteer Account</button>
          <a class="btn btn-secondary" href="portal-auth.html">Already a signed-up volunteer? Sign In</a>
          <a class="btn btn-secondary" href="portal-landing.html">Back to Portal Landing</a>
        </div>

        <div class="small">Passwords are handled by Supabase Auth and never stored as plain text in your custom tables.</div>
        <div id="message"></div>
      </form>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "sf_a66bca4711256ac8e68b286d";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("volunteer-form");
    const submitBtn = document.getElementById("submit-btn");
    const messageEl = document.getElementById("message");

    let cooldownTimer = null;
    let cooldownRemaining = 0;

    function showMessage(text, type = "error") {
      messageEl.innerHTML = `<div class="notice ${type}">${text}</div>`;
    }

    function normalizePhone(phone) {
      return (phone || "").replace(/[^\d+()-.\s]/g, "").trim();
    }

    function cleanEmail(email) {
      return String(email || "").trim().toLowerCase().replace(/\u200B/g, "");
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function startCooldown(seconds = 60) {
      clearInterval(cooldownTimer);
      cooldownRemaining = seconds;
      submitBtn.disabled = true;
      submitBtn.textContent = `Please wait (${cooldownRemaining}s)`;

      cooldownTimer = setInterval(() => {
        cooldownRemaining -= 1;
        if (cooldownRemaining <= 0) {
          clearInterval(cooldownTimer);
          submitBtn.disabled = false;
          submitBtn.textContent = "Create Volunteer Account";
          return;
        }
        submitBtn.textContent = `Please wait (${cooldownRemaining}s)`;
      }, 1000);
    }

    function mapAuthError(err) {
      const code = err?.code || "";
      const msg = err?.message || "Signup failed.";

      if (code === "signup_disabled") return { text: "Signup is disabled in Supabase Auth. Please contact admin.", type: "error" };
      if (code === "email_address_invalid") return { text: "This email is being rejected by Auth settings. Try another email or adjust allowed domains in Supabase.", type: "error" };
      if (code === "user_already_exists" || /already/i.test(msg)) return { text: "An account with this email already exists. Please sign in instead.", type: "warn" };
      if (code === "weak_password" || /password/i.test(msg)) return { text: "Password does not meet policy requirements.", type: "error" };
      if (code === "over_email_send_rate_limit") return { text: "Too many signup attempts. Please wait 60 seconds and try again.", type: "warn" };

      return { text: `Auth signup failed: ${msg}`, type: "error" };
    }

    async function upsertVolunteerProfile(userId) {
      const { error } = await supabase
        .from("profiles")
        .upsert(
          { id: userId, role: "volunteer", updated_at: new Date().toISOString() },
          { onConflict: "id" }
        );

      if (error) throw new Error(`Profile upsert failed: ${error.message}`);
    }

    async function insertVolunteerSignupRow({ userId, payload }) {
      const { error } = await supabase
        .from("volunteer_signups")
        .insert([{
          user_id: userId,
          first_name: payload.first_name,
          last_name: payload.last_name,
          email: payload.email,
          phone: payload.phone || null,
          interests: payload.interests,
          availability_notes: payload.availability_notes || null
        }]);

      if (error) throw new Error(`Signup row insert failed: ${error.message}`);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (cooldownRemaining > 0) {
        showMessage(`Please wait ${cooldownRemaining}s before trying again.`, "warn");
        return;
      }

      const payload = {
        first_name: form.first_name.value.trim(),
        last_name: form.last_name.value.trim(),
        email: cleanEmail(form.email.value),
        phone: normalizePhone(form.phone.value),
        password: form.password.value,
        confirm_password: form.confirm_password.value,
        interests: form.interests.value,
        availability_notes: form.availability.value.trim()
      };

      if (!payload.first_name || !payload.last_name || !payload.email || !payload.password || !payload.confirm_password || !payload.interests) {
        showMessage("Please complete all required fields.", "error");
        return;
      }

      if (!isValidEmail(payload.email)) {
        showMessage("Please enter a valid email address.", "error");
        return;
      }

      if (payload.password.length < 8) {
        showMessage("Password must be at least 8 characters.", "error");
        return;
      }

      if (payload.password !== payload.confirm_password) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account...";
      showMessage("Creating account...", "success");

      try {
        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
          email: payload.email,
          password: payload.password,
          options: {
            data: {
              first_name: payload.first_name,
              last_name: payload.last_name,
              role: "volunteer"
            }
          }
        });

        if (signUpError) {
          console.error("Supabase signUp error object:", signUpError);

          const mapped = mapAuthError(signUpError);

          if (signUpError.code === "over_email_send_rate_limit") {
            showMessage(mapped.text, mapped.type);
            startCooldown(60);
            return;
          }

          throw new Error(mapped.text);
        }

        const userId = signUpData?.user?.id ?? null;

        if (userId) {
          await upsertVolunteerProfile(userId);
        }

        await insertVolunteerSignupRow({ userId, payload });

        form.reset();
        showMessage("Account created! Check your email to verify, then sign in.", "success");
      } catch (err) {
        console.error("Signup flow error:", err);
        showMessage(err.message || "Could not create account. Please try again.", "error");
      } finally {
        if (cooldownRemaining <= 0) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Create Volunteer Account";
        }
      }
    });
  </script>
</body>
</html>
