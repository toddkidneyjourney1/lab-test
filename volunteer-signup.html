<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Signup | The Laboratory Theater of Florida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hamburger Menu -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
    </label>

    <!-- Menu Overlay (Scrim) -->
    <label for="nav-toggle" class="nav-overlay"></label>

    <nav class="hamburger-menu">
        <a href="about.html">Origin Story</a>
        <a href="archive25.html">Past Experiments</a>
        <a href="index.html">Back to the Slab</a>
        <a href="plan.html">Lab Protocols</a>

    <!-- Header -->
    <header>
        <div class="logo">
            THE <span>LAB</span>
            <p class="tagline">Intentionally innovative live theater</p>
        </div>
    </header>

    <main style="max-width:700px;margin:2rem auto;padding:1rem;">
        <h1>Volunteer Signup</h1>
        <p>Complete this form to join our volunteer team.</p>

        <form action="volunteer-portal.html" method="get" style="display:grid;gap:1rem;">
            <label>Full Name
                <input type="text" name="name" required>
            </label>

            <label>Email
                <input type="email" name="email" required>
            </label>

            <label>Phone
                <input type="tel" name="phone">
            </label>

            <label>Availability
                <textarea name="availability" rows="4" placeholder="Weekends, evenings, etc."></textarea>
            </label>

            <button type="submit">Continue to Volunteer Portal</button>
        </form>
    </main>
</body>
</html>
