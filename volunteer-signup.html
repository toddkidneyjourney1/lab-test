<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Signup | The Laboratory Theater of Florida</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --bg: #0f0f12;
      --card-bg: #1a1b21;
      --text: #f5f5f5;
      --muted: #b9bcc7;
      --accent: #d72638;
      --accent-2: #9f1d2a;
      --border: #333846;
      --success: #1f8f4e;
      --error: #a33131;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.4;
    }

    main {
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem 2rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.65rem;
    }

    .sub {
      color: var(--muted);
      margin: 0 0 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 600;
      font-size: 0.92rem;
    }

    input, select, textarea {
      width: 100%;
      background: #101117;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.68rem 0.72rem;
      font: inherit;
      box-sizing: border-box;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(215, 38, 56, 0.2);
    }

    .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 0.72rem 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-2); }

    .btn-secondary {
      background: #4a4f5e;
      color: #fff;
    }

    .btn:disabled,
    .btn[aria-disabled="true"] {
      opacity: 0.7;
      cursor: not-allowed;
      pointer-events: none;
    }

    .notice {
      margin-top: 0.95rem;
      border-radius: 8px;
      padding: 0.75rem 0.85rem;
      font-weight: 600;
    }

    .notice.success { background: var(--success); color: #fff; }
    .notice.error { background: var(--error); color: #fff; }

    .small {
      color: var(--muted);
      font-size: 0.87rem;
      margin-top: 0.65rem;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Volunteer Signup</h1>
      <p class="sub">Complete this form to join the volunteer team.</p>

      <form id="volunteer-form" novalidate>
        <div class="grid">
          <div class="field-group">
            <label for="first_name">First Name</label>
            <input id="first_name" name="first_name" type="text" required maxlength="80" />
          </div>

          <div class="field-group">
            <label for="last_name">Last Name</label>
            <input id="last_name" name="last_name" type="text" required maxlength="80" />
          </div>

          <div class="field-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required maxlength="180" />
          </div>

          <div class="field-group">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" maxlength="40" placeholder="(555) 555-5555" />
          </div>

          <div class="field-group full">
            <label for="interests">Areas of Interest</label>
            <select id="interests" name="interests" required>
              <option value="">Select one...</option>
              <option value="front-of-house">Front of House</option>
              <option value="set-build">Set Build</option>
              <option value="costumes">Costumes</option>
              <option value="lighting-sound">Lighting / Sound</option>
              <option value="marketing">Marketing</option>
              <option value="general">General Volunteer</option>
            </select>
          </div>

          <div class="field-group full">
            <label for="availability">Availability / Notes</label>
            <textarea id="availability" name="availability" placeholder="Best days/times, experience, and anything we should know."></textarea>
          </div>
        </div>

        <div class="actions">
          <button id="submit-btn" class="btn btn-primary" type="submit">Submit Signup</button>
          <a id="pick-shift-btn" class="btn btn-secondary" href="portal-landing.html" aria-disabled="true" title="Volunteer login required">Pick Your Shift</a>
          <a class="btn btn-secondary" href="portal-landing.html">Back to Portal Landing</a>
        </div>

        <div class="small">By submitting, your information is securely stored in our volunteer signup database.</div>
        <div id="message"></div>
      </form>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_xfsIVVSH8vcUz9XfZgirwA_wl-GSYOw";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("volunteer-form");
    const submitBtn = document.getElementById("submit-btn");
    const messageEl = document.getElementById("message");
    const pickShiftBtn = document.getElementById("pick-shift-btn");

    function showMessage(text, type = "error") {
      messageEl.innerHTML = `<div class="notice ${type}">${text}</div>`;
      setTimeout(() => { messageEl.innerHTML = ""; }, 6000);
    }

    function normalizePhone(phone) {
      return (phone || "").replace(/[^\d+()-.\s]/g, "").trim();
    }

    function disablePickShift(reason = "Volunteer login required") {
      pickShiftBtn.href = "portal-landing.html";
      pickShiftBtn.setAttribute("aria-disabled", "true");
      pickShiftBtn.setAttribute("title", reason);
    }

    function enablePickShift() {
      pickShiftBtn.href = "volunteer.html";
      pickShiftBtn.removeAttribute("aria-disabled");
      pickShiftBtn.removeAttribute("title");
    }

    async function userIsVolunteer() {
      const { data: { user }, error: userErr } = await supabase.auth.getUser();
      if (userErr || !user) return false;

      const { data: profile, error: profileErr } = await supabase
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .maybeSingle();

      if (profileErr || !profile) return false;
      return profile.role === "volunteer";
    }

    async function enforcePickShiftRole() {
      const isVolunteer = await userIsVolunteer();
      if (isVolunteer) {
        enablePickShift();
      } else {
        disablePickShift("Volunteer login required");
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        first_name: form.first_name.value.trim(),
        last_name: form.last_name.value.trim(),
        email: form.email.value.trim().toLowerCase(),
        phone: normalizePhone(form.phone.value),
        interests: form.interests.value,
        availability_notes: form.availability.value.trim()
      };

      if (!payload.first_name || !payload.last_name || !payload.email || !payload.interests) {
        showMessage("Please complete all required fields.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const { data: authData } = await supabase.auth.getUser();
      const userId = authData?.user?.id ?? null;

      const { error } = await supabase
        .from("volunteer_signups")
        .insert([{
          user_id: userId,
          first_name: payload.first_name,
          last_name: payload.last_name,
          email: payload.email,
          phone: payload.phone || null,
          interests: payload.interests,
          availability_notes: payload.availability_notes || null
        }]);

      if (error) {
        showMessage(error.message || "Could not submit signup. Please try again.", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Signup";
        return;
      }

      form.reset();
      showMessage("Thanks! Your volunteer signup was submitted successfully.", "success");
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Signup";
    });

    enforcePickShiftRole();

    supabase.auth.onAuthStateChange(async () => {
      await enforcePickShiftRole();
    });
  </script>
</body>
</html>
