<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
  <title>Cast Portal Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0f12;
      color: #f4f4f6;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 1rem;
    }

    .login-card {
      width: min(100%, 460px);
      background: #17181f;
      border: 1px solid #323644;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      padding: 1.5rem;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    p {
      color: #b8bcc8;
      line-height: 1.5;
    }

    .stack {
      display: grid;
      gap: 0.9rem;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.8rem 0.9rem;
      border-radius: 10px;
      border: 1px solid #4a5065;
      background: #0f1117;
      color: #f4f4f6;
    }

    button,
    a.button-link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      border: 1px solid #8e1a26;
      background: #d72638;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button.secondary,
    a.secondary {
      background: #2c5aa0;
      border-color: #1e3f6f;
    }

    .notice,
    .error,
    .success {
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
    }

    .notice {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid #f59e0b;
      color: #fde68a;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      display: none;
    }

    .success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid #22c55e;
      color: #86efac;
      display: none;
    }

    .meta {
      font-size: 0.9rem;
      color: #b8bcc8;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Portal Login</h1>
    <p id="login-context">Sign in to continue to your cast or admin portal.</p>

    <div id="config-notice" class="notice" style="display: none;">
      Add your Supabase values to <strong>supabase-config.js</strong> before using this page.
    </div>

    <div id="error-message" class="error"></div>
    <div id="success-message" class="success"></div>

    <form id="login-form" class="stack">
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button type="submit">Sign In</button>
      <button type="button" id="reset-password" class="secondary">Send Password Reset Email</button>
      <a class="button-link secondary" href="cast-portal.html">Back to Cast Portal</a>
    </form>

    <p class="meta" id="destination-preview"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const config = window.APP_CONFIG || {};
    const errorBox = document.getElementById('error-message');
    const successBox = document.getElementById('success-message');
    const configNotice = document.getElementById('config-notice');
    const form = document.getElementById('login-form');
    const context = document.getElementById('login-context');
    const destinationPreview = document.getElementById('destination-preview');
    const resetPasswordButton = document.getElementById('reset-password');
    const params = new URLSearchParams(window.location.search);
    const requestedRole = params.get('role') || sessionStorage.getItem('intendedRole') || 'cast';
    const requestedShow = params.get('show') || sessionStorage.getItem('intendedShow') || '';

    context.textContent = requestedShow
      ? `Sign in to continue to the ${requestedShow.toUpperCase()} ${requestedRole} portal.`
      : 'Sign in to continue to your cast or admin portal.';

    destinationPreview.textContent = requestedShow
      ? `Requested destination: ${requestedRole === 'admin' ? 'admin' : 'cast'}-${requestedShow}.html`
      : '';

    function showError(message) {
      errorBox.style.display = 'block';
      errorBox.textContent = message;
      successBox.style.display = 'none';
    }

    function showSuccess(message) {
      successBox.style.display = 'block';
      successBox.textContent = message;
      errorBox.style.display = 'none';
    }

    function hasValidConfig() {
      return Boolean(
        config.SUPABASE_URL &&
        config.SUPABASE_ANON_KEY &&
        !config.SUPABASE_URL.includes('YOUR-PROJECT') &&
        !config.SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_KEY')
      );
    }

    let supabase = null;

    if (!hasValidConfig()) {
      configNotice.style.display = 'block';
      Array.from(form.elements).forEach((element) => {
        if (element.tagName !== 'A') {
          element.disabled = true;
        }
      });
    } else {
      supabase = window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
    }

    async function verifyAccess(userId, role, showName) {
      const { data, error } = await supabase
        .from('show_access')
        .select('id')
        .eq('user_id', userId)
        .eq('role', role)
        .eq('show_name', showName)
        .maybeSingle();

      if (error) throw error;
      return Boolean(data);
    }

    function getDestinationPath(role, showName) {
      return role === 'admin' ? `admin-${showName}.html` : `cast-${showName}.html`;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!supabase) {
        showError('Supabase is not configured. Update supabase-config.js first.');
        return;
      }

      const formData = new FormData(form);
      const email = String(formData.get('email') || '').trim();
      const password = String(formData.get('password') || '');

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const user = data?.user;
        if (!user) {
          showError('Login failed. No user returned.');
          return;
        }

        if (requestedShow) {
          const hasAccess = await verifyAccess(user.id, requestedRole, requestedShow);
          if (!hasAccess) {
            await supabase.auth.signOut();
            showError('Your account does not have access to that show/role.');
            return;
          }

          showSuccess('Login successful. Redirecting...');
          window.location.href = getDestinationPath(requestedRole, requestedShow);
          return;
        }

        showSuccess('Login successful. Redirecting to cast portal...');
        window.location.href = 'cast-portal.html';
      } catch (error) {
        console.error(error);
        showError(error.message || 'Unable to sign in.');
      }
    });

    resetPasswordButton.addEventListener('click', async () => {
      if (!supabase) {
        showError('Supabase is not configured. Update supabase-config.js first.');
        return;
      }

      const email = document.getElementById('email').value.trim();
      if (!email) {
        showError('Enter your email address first.');
        return;
      }

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: `${window.location.origin}${window.location.pathname}`
        });

        if (error) throw error;
        showSuccess('Password reset email sent.');
      } catch (error) {
        console.error(error);
        showError(error.message || 'Unable to send password reset email.');
      }
    });
  </script>
</body>
</html>
