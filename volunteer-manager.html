
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volunteer Manager</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .admin-panel { border: 1px solid #333; padding: 20px; margin-bottom: 20px; background: #1e1e1e; }
        input, select, button { background: #333; color: white; border: 1px solid #555; padding: 8px; margin: 5px 0; }
        button { cursor: pointer; background: #444; }
        button:hover { background: #555; }
        #report { margin-top: 20px; padding: 15px; background: #1e1e1e; }
        .needs-filling { color: #ffab91; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>Manage Calendar</h2>
        <input type="date" id="shiftDate">
        <input type="text" id="oppName" placeholder="Opportunity Name (e.g. Waiting for Godot)">
        <input type="number" id="shiftSpots" placeholder="Total Spots">
        <button onclick="addOpportunity()">Add/Update Opportunity</button>
        <hr>
        <button onclick="generateReport()">Generate Shift Report</button>
    </div>

    <div id="report"></div>

    <script>
        // Mock storage - replace with actual backend integration
        let calendarData = {}; 

        function addOpportunity() {
            const date = document.getElementById('shiftDate').value;
            const opp = document.getElementById('oppName').value;
            const spots = document.getElementById('shiftSpots').value;
            
            if(!date || !opp) return alert("Please fill date and name");
            
            calendarData[date] = { name: opp, totalSpots: spots, filled: 0 };
            alert("Opportunity added to " + date);
        }

        function generateReport() {
            let html = "<h3>All Shifts</h3><ul>";
            for (const [date, data] of Object.entries(calendarData)) {
                const needs = data.totalSpots - data.filled;
                const style = needs > 0 ? "class='needs-filling'" : "";
                html += `<li ${style}>${date}: ${data.name} (${data.filled}/${data.totalSpots} filled) ${needs > 0 ? '- NEEDS FILLED' : ''}</li>`;
            }
            html += "</ul>";
            document.getElementById('report').innerHTML = html;
        }
    </script>
</body>
</html>
