<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volunteer Manager</title>
    <!-- Load Supabase library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .admin-panel { border: 1px solid #333; padding: 20px; margin-bottom: 20px; background: #1e1e1e; border-radius: 8px; }
        input, button { background: #333; color: white; border: 1px solid #555; padding: 10px; margin: 5px 0; display: block; width: 100%; max-width: 400px; border-radius: 4px; }
        button { cursor: pointer; background: #444; font-weight: bold; }
        button:hover { background: #555; }
        #report { margin-top: 20px; padding: 15px; background: #1e1e1e; border-radius: 8px; }
        .needs-filling { color: #ffab91; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>Manage Calendar</h2>
        <input type="text" id="oppName" placeholder="Opportunity Name">
        <label>Start Time:</label>
        <input type="datetime-local" id="shiftStart">
        <label>End Time:</label>
        <input type="datetime-local" id="shiftEnd">
        <input type="number" id="shiftSpots" placeholder="Total Spots">
        <!-- These buttons now call global functions -->
        <button onclick="addOpportunity()">Add/Update Opportunity</button>
        <hr>
        <button onclick="generateReport()">Generate Shift Report</button>
    </div>

    <div id="report"></div>

    <script>
    // 1. Declare configuration constants
    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_wo-PDCkLxkuGLsar5by1Sw_ShjHgZDC";
    
    // 2. Initialize the client safely
    // Note: We use a different variable name 'supabaseClient' to avoid 
    // potential conflicts with the library namespace
    let supabaseClient = null;

    // Wait for the library to be fully loaded
    window.addEventListener('load', () => {
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log("Supabase initialized successfully");
        } else {
            console.error("Supabase library not found");
        }
    });

    async function addOpportunity() {
        if (!supabaseClient) {
            alert("Supabase is still initializing, please wait a second and try again.");
            return;
        }

        const opp = document.getElementById('oppName').value;
        const start = document.getElementById('shiftStart').value;
        const end = document.getElementById('shiftEnd').value;
        const spots = document.getElementById('shiftSpots').value;
        
        if(!opp || !start || !end || !spots) return alert("Please fill in all fields");
        
        try {
            const { data, error } = await supabaseClient.from('shifts').insert([
                { 
                    opportunity_name: opp, 
                    start_time: start, 
                    end_time: end, 
                    total_spots: parseInt(spots), 
                    filled: 0 
                }
            ]);

            if (error) throw error;
            alert("Shift added successfully!");
        } catch (err) {
            alert("Error: " + err.message);
            console.error(err);
        }
    }

    async function generateReport() {
        if (!supabaseClient) return alert("Supabase not ready.");

        const { data: shifts, error } = await supabaseClient.from('shifts').select('*');
        
        if (error) return alert("Error: " + error.message);

        let html = "<h3>All Shifts</h3><ul>";
        shifts.forEach(shift => {
            const needs = shift.total_spots - shift.filled;
            const style = needs > 0 ? "class='needs-filling'" : "";
            const date = new Date(shift.start_time).toLocaleString();
            html += `<li ${style}>${date}: ${shift.opportunity_name} (${shift.filled}/${shift.total_spots} filled) ${needs > 0 ? '- NEEDS FILLED' : ''}</li>`;
        });
        html += "</ul>";
        document.getElementById('report').innerHTML = html;
    }
</script>
