<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting for Godot | Cast Rehearsal Hub</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Load Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Keep your existing CSS */
        .cast-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; padding: 2rem; }
        .cast-card { background: #1a1b22; padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid #2b2d3a; }
    </style>
</head>
<body>

    <main>
        <h1>Cast Members</h1>
        <div id="cast-list" class="cast-container">
            <!-- Data will be injected here -->
            <p>Loading cast data...</p>
        </div>
    </main>

    <script>
    // 1. Initialize with a unique variable name (e.g., 'sbClient')
    let sbClient;

    if (typeof sbClient === 'undefined') {
        const supabaseUrl = 'https://izytzrxrgnahyvgwqhgd.supabase.co';
        const supabaseKey = 'sb_publishable_UMVNR69vN_30ZGOjARlJlw_neIicJAg';
        sbClient = supabase.createClient(supabaseUrl, supabaseKey);
    }

    async function loadCast() {
        console.log("Attempting to fetch...");
        
        // 2. Use your unique client variable here
        const { data, error } = await sbClient
            .from('theater_data')
            .select('*')
            .eq('show_id', 'godot')
            .eq('category', 'cast');

        if (error) {
            console.error("Supabase Error:", error.message);
            document.getElementById('cast-list').innerHTML = `<p>Error: ${error.message}</p>`;
            return;
        }
        
        console.log("Data received:", data);
        const container = document.getElementById('cast-list');
        
        if (!data || data.length === 0) {
            container.innerHTML = '<p>No cast members found for this show.</p>';
            return;
        }

        container.innerHTML = data.map(member => `
            <div class="cast-card">
                <h3>${member.name}</h3>
                <p>${member.role}</p>
                <small>${member.notes || ''}</small>
            </div>
        `).join('');
    }

    document.addEventListener('DOMContentLoaded', loadCast);
</script>
</html>
