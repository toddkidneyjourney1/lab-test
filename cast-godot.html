<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting for Godot | Cast Rehearsal Hub</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Load Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Keep your existing CSS */
        .cast-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; padding: 2rem; }
        .cast-card { background: #1a1b22; padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid #2b2d3a; }
    </style>
</head>
<body>

    <main>
        <h1>Cast Members</h1>
        <div id="cast-list" class="cast-container">
            <!-- Data will be injected here -->
            <p>Loading cast data...</p>
        </div>
    </main>

    <script>
        // Use the same project URL and Key you used in your dashboard
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        async function loadCast() {
            const { data, error } = await supabase
                .from('theater_data')
                .select('*')
                .eq('show_id', 'godot') // Only load data for this show
                .eq('category', 'cast');

            if (error) {
                console.error("Error loading cast:", error);
                return;
            }

            const container = document.getElementById('cast-list');
            container.innerHTML = data.map(member => `
                <div class="cast-card">
                    <h3>${member.name}</h3>
                    <p>${member.role}</p>
                    <small>${member.notes || ''}</small>
                </div>
            `).join('');
        }

        loadCast();
    </script>
</body>
</html>
