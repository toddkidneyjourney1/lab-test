<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Show Admin Dashboard</title>
    <style>
        :root {
            --bg: #070b16;
            --panel: #0f162d;
            --panel-soft: #121c38;
            --text: #e8eeff;
            --muted: #9eb0db;
            --accent: #64b5ff;
            --border: #2e4277;
        }

        body {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .dashboard {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 { margin-bottom: 2rem; }

        /* Cast Grid Styles */
        .cast-section {
            background: var(--panel);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .cast-card {
            background: var(--panel-soft);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .cast-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--border);
            margin-bottom: 0.75rem;
            object-fit: cover;
        }

        .cast-name { font-weight: 600; display: block; margin-bottom: 0.25rem; }
        .bio-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-size: 0.9rem;
        }
        .bio-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<main class="dashboard">
    <h1>Production Dashboard</h1>

    <section class="cast-section">
        <h2>Cast Members</h2>
        <div class="cast-grid">
            <!-- Example Cast Card -->
            <div class="cast-card">
                <img src="assets/cast/placeholder.jpg" alt="Actor Name" class="cast-photo">
                <span class="cast-name">Actor Name</span>
                <a href="bios.html" class="bio-link">View Bio</a>
            </div>
            
            <!-- Add more cast cards as needed -->
            <div class="cast-card">
                <img src="assets/cast/placeholder.jpg" alt="Actor Name" class="cast-photo">
                <span class="cast-name">Actor Name</span>
                <a href="bios.html" class="bio-link">View Bio</a>
            </div>
        </div>
    </section>
</main>

</body>
</html>
