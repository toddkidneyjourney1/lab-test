<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Show Admin Dashboard</title>
    <!-- Load Supabase v2 from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <h1>Dashboard</h1>
        <div id="kpi-cast">0</div>
        <table id="cast-table">
            <tbody id="cast-tbody"></tbody>
        </table>
    </div>

    <script>
        // 1. Initialize Supabase Client
        const supabaseUrl = 'https://supabase.com/dashboard/project/izytzrxrgnahyvgwqhgd.co';
        const supabaseKey = 'sb_publishable_UMVNR69vN_30ZGOjARlJlw_neIicJAg';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const $ = (id) => document.getElementById(id);

        // 2. Fetch Data (Async/Await)
        async function refreshDashboard() {
            const { data, error } = await supabase
                .from('theater_data') // Ensure your table name matches
                .select('*');

            if (error) {
                console.error('Fetch error:', error.message);
                return;
            }
            renderAll(data);
        }

        // 3. Render Data to UI
        function renderAll(data) {
            const cast = data.filter(d => d.category === 'cast');
            $('kpi-cast').textContent = cast.length;

            const castBody = $('cast-tbody');
            castBody.innerHTML = cast.map(row => `
                <tr>
                    <td>${row.name}</td>
                    <td>${row.role}</td>
                    <td><button onclick="deleteItem('${row.id}')">Remove</button></td>
                </tr>
            `).join('');
        }

        // 4. Delete Data
        async function deleteItem(id) {
            const { error } = await supabase
                .from('theater_data')
                .delete()
                .eq('id', id);

            if (error) console.error('Delete error:', error.message);
            else refreshDashboard();
        }

        // Initialize
        refreshDashboard();
    </script>
</body>
</html>
