<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Show Admin Dashboard (Lab Style)</title>
  <style>
    :root{ --bg:#070b16; --panel:#0f162d; --panel-soft:#121c38; --text:#e8eeff; --muted:#9eb0db; --accent:#64b5ff; --accent2:#9b8bff; --border:#2e4277; --ok:#4ade80; --danger:#f87171; --warn:#f59e0b; --glow:0 0 0 1px rgba(120,160,255,.15), 0 12px 34px rgba(0,0,0,.45); }
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    body{ min-height:100vh; color:var(--text); background: radial-gradient(1100px 520px at -8% -18%, rgba(76,130,255,.26) 0%, transparent 58%), radial-gradient(950px 420px at 112% -8%, rgba(176,112,255,.22) 0%, transparent 55%), linear-gradient(180deg,#060913 0%, #080d1b 60%, #060913 100%); display:grid;grid-template-rows:auto 1fr auto; }
    header{ border-bottom:1px solid rgba(117,149,222,.25); background:rgba(7,11,22,.78); backdrop-filter:blur(10px); position:sticky;top:0;z-index:20; }
    .topbar{ max-width:1280px;margin:0 auto;padding:.85rem 1rem; display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap; }
    .brand{ display:flex;align-items:center;gap:.65rem;font-weight:700;letter-spacing:.2px; }
    .logo{ width:36px;height:36px;border-radius:11px;display:grid;place-items:center; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#102047;font-weight:900;font-size:.82rem; box-shadow:0 8px 20px rgba(102,153,255,.35); }
    .brand span.title{ font-size:1rem; }
    .pill{ font-size:.74rem;padding:.25rem .62rem;border-radius:999px;font-weight:700; color:#131a3f;background:linear-gradient(135deg,#bfdcff,#ddd6fe); border:1px solid rgba(255,255,255,.35); }
    .actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
    main{ max-width:1280px;width:100%;margin:0 auto;padding:1rem; display:grid;grid-template-columns:300px 1fr;gap:1rem; }
    .sidebar,.panel{ border:1px solid var(--border); border-radius:16px;padding:1rem; background: linear-gradient(180deg,rgba(20,30,58,.9),rgba(12,18,36,.94)); box-shadow:var(--glow); }
    .sidebar{position:sticky;top:84px;height:fit-content}
    .nav-title{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.9px;margin-bottom:.52rem}
    .nav-links{display:grid;gap:.45rem}
    .nav-link{ display:block;padding:.56rem .66rem;border-radius:10px;color:#dce5ff;text-decoration:none;border:1px solid transparent; transition:.16s ease; }
    .nav-link:hover{background:rgba(100,181,255,.1);border-color:#4a6eb3}
    .nav-link.active{background:rgba(155,139,255,.16);border-color:#5c52a6}
    .status{ margin-top:.92rem;border:1px dashed #465f9f;border-radius:12px;padding:.66rem;color:#c1cdf0;font-size:.84rem; background:rgba(15,23,47,.45); }
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .small{font-size:.8rem;color:var(--muted)}
    .content{display:grid;gap:1rem}
    .hero{display:grid;grid-template-columns:1.2fr 1fr;gap:1rem}
    .hero h1{font-size:1.26rem;margin-bottom:.38rem;letter-spacing:.2px}
    .sub{color:var(--muted);font-size:.92rem;line-height:1.45}
    .kpis{margin-top:.9rem;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.62rem}
    .kpi{ border:1px solid #3a5194;border-radius:12px;padding:.66rem; background:linear-gradient(180deg,rgba(14,23,47,.8),rgba(10,17,34,.88)); }
    .kpi .label{font-size:.76rem;color:var(--muted)}
    .kpi .value{font-size:1.03rem;font-weight:700;margin-top:.2rem}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .section-title{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.72rem;flex-wrap:wrap}
    .section-title h2{font-size:1rem}
    .stack,.list{display:grid;gap:.55rem}
    .item{ border:1px solid #3a5194;border-radius:12px;padding:.64rem; background:rgba(12,20,42,.78) }
    .item-top{display:flex;justify-content:space-between;gap:.6rem;align-items:center;margin-bottom:.25rem}
    .item-title{font-weight:650;font-size:.93rem}
    .item-meta{font-size:.82rem;color:var(--muted)}
    .badge{font-size:.74rem;font-weight:700;padding:.2rem .48rem;border-radius:999px;border:1px solid}
    .b-info{color:#c7d2fe;border-color:#4f46e5;background:rgba(99,102,241,.16)}
    .b-ok{color:#bbf7d0;border-color:#2d7b4a;background:rgba(34,197,94,.15)}
    .b-warn{color:#fde68a;border-color:#946300;background:rgba(245,158,11,.18)}
    .table-wrap{overflow:auto;border:1px solid #364b8a;border-radius:12px}
    table{width:100%;border-collapse:collapse;min-width:640px;background:rgba(11,18,38,.78)}
    th,td{padding:.62rem .68rem;border-bottom:1px solid #2e4179;text-align:left;font-size:.86rem;vertical-align:top}
    th{font-size:.78rem;color:#bec9ef;text-transform:uppercase;letter-spacing:.65px;background:rgba(18,29,59,.98)}
    tr:hover td{background:rgba(96,165,250,.06)}
    label{font-size:.82rem;color:#c9d4f5;display:block;margin-bottom:.3rem}
    input,select,textarea{ width:100%;border:1px solid #3c569a;background:#0f1832;color:var(--text); border-radius:10px;padding:.56rem .6rem;font-size:.9rem; }
    textarea{min-height:96px;resize:vertical}
    button,.btn{ border:1px solid var(--border); background:linear-gradient(180deg,#152243,#101a34); color:var(--text); border-radius:10px;padding:.52rem .76rem;font-size:.88rem;cursor:pointer;text-decoration:none; transition:.15s ease; }
    button:hover,.btn:hover{border-color:#5877c2;background:linear-gradient(180deg,#1a2a54,#122043)}
    .btn-primary{ border:none;background:linear-gradient(135deg,#64b5ff,#9b8bff); color:#0f1f49;font-weight:700; box-shadow:0 6px 16px rgba(117,163,255,.35); }
    .btn-danger{border:1px solid #7f1d1d;color:#fecaca;background:rgba(248,113,113,.15)}
    .btn-danger:hover{background:rgba(248,113,113,.24)}
    .msg{min-height:1.2rem;font-size:.84rem;color:var(--muted)}
    .msg.error{color:var(--danger)}
    .msg.success{color:var(--ok)}
    footer{ border-top:1px solid rgba(117,149,222,.25); text-align:center;color:var(--muted);font-size:.82rem;padding:.95rem; background:rgba(7,11,22,.78); backdrop-filter:blur(8px); }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="logo">TP</div>
        <span class="title">Lab Dashboard</span>
        <span class="pill">ADMIN</span>
      </div>
      <div class="actions">
        <select id="show-selector"></select>
        <button id="btn-refresh">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="nav-title">Navigation</div>
      <nav class="nav-links">
        <a class="nav-link active" href="#overview">Overview</a>
        <a class="nav-link" href="#cast">Cast List</a>
      </nav>
      <div class="status" id="show-status">Loading Database...</div>
    </aside>

    <section class="content">
      <!-- Your existing sections here... -->
      <article class="panel" id="overview">
        <h1 id="show-title">Show Operations</h1>
        <div class="kpis">
          <div class="kpi"><div class="label">Cast Members</div><div class="value" id="kpi-cast">0</div></div>
        </div>
      </article>
      <!-- Ensure IDs match the original HTML structure for the bind() function -->
      <article class="panel" id="cast">
        <form id="cast-form"><input id="cast-name" placeholder="Name"><input id="cast-role" placeholder="Role"><button type="submit">Add</button></form>
        <tbody id="cast-tbody"></tbody>
      </article>
    </section>
  </main>

  <script>
    // Initialize Supabase
    const supabase = supabase.createClient(
      'https://izytzrxrgnahyvgwqhgd.supabase.co', 
      'sb_publishable_wo-PDCkLxkuGLsar5by1Sw_ShjHgZDCE'
    );

    let currentShowId = 'fences'; 
    let currentData = {};

    async function loadStore() {
      const { data, error } = await supabase
        .from('show_data')
        .select('*')
        .eq('show_id', currentShowId);

      if (error) return console.error(error);
      // Map data to the app state and refresh UI
      currentData = data;
      renderAll();
    }

    async function mutate(moduleType, content) {
      const { data, error } = await supabase
        .from('show_data')
        .upsert({ show_id: currentShowId, module_type: moduleType, content: content });
      
      if (error) console.error(error);
      else loadStore(); // Re-fetch to sync
    }

    // Replace renderAll and other UI logic here...
    function renderAll() {
      // ... your existing render logic using 'currentData' ...
    }

    function init() {
      loadStore();
    }
    init();
  </script>
</body>
</html>
