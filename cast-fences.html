<!-- Add this section where you want the calendar to appear (recommended: under the hero section) -->
<section class="cast-card">
  <h2>Rehearsal Calendar</h2>
  <div class="calendar-embed-wrap">
    <iframe
      src="https://calendar.google.com/calendar/embed?src=YOUR_CALENDAR_ID&ctz=America%2FNew_York"
      style="border:0"
      width="100%"
      height="360"
      frameborder="0"
      scrolling="no"
      title="FENCES rehearsal calendar">
    </iframe>
  </div>
  <p class="calendar-note">Tip: use the button in the bottom-right of the calendar to open full screen.</p>
</section>

<style>
  .calendar-embed-wrap {
    width: 100%;
    max-width: 760px;   /* makes it smaller */
    margin: 0 auto;     /* centers the smaller calendar */
    border: 1px solid #323644;
    border-radius: 10px;
    overflow: hidden;
    background: #11131a;
  }

  .calendar-note {
    margin-top: 0.6rem;
    color: #b8bcc8;
    font-size: 0.86rem;
    text-align: center;
  }

  @media (max-width: 768px) {
    .calendar-embed-wrap iframe {
      height: 320px;
    }
  }
</style>
