<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Sponsors | The Laboratory Theater of Florida</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sponsor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            padding: 2rem;
            align-items: center;
        }
        .sponsor-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #333;
        }
        .sponsor-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2);
            border-color: var(--accent);
        }
        .sponsor-card img {
            max-width: 100%;
            height: auto;
            max-height: 100px;
            filter: grayscale(100%);
            transition: filter 0.3s ease;
        }
        .sponsor-card:hover img {
            filter: grayscale(0%);
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="button">Home</a>
        </nav>
        <h1>Our Amazing Sponsors</h1>
    </header>

    <main>
        <p style="text-align: center;">We are incredibly grateful to the local businesses and individuals who make our productions possible.</p>
        
        <section class="sponsor-grid">
            <!-- Add your sponsor logos here -->
            <div class="sponsor-card">
                <img src="assets/sponsor1.png" alt="Sponsor Logo">
                <h3>Sponsor Name</h3>
            </div>
            <div class="sponsor-card">
                <img src="assets/sponsor2.png" alt="Sponsor Logo">
                <h3>Sponsor Name</h3>
            </div>
        </section>
    </main>

</body>
</html>
