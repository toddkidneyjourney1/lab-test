<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theater Portal Authentication</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121a30;
      --panel-2:#1a2646;
      --text:#e7ecff;
      --muted:#a9b5dc;
      --accent:#60a5fa;
      --accent-2:#a78bfa;
      --ok:#4ade80;
      --warn:#f59e0b;
      --danger:#f87171;
      --border:#2a3866;
      --focus:#38bdf8;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}

    body{
      min-height:100vh;color:var(--text);
      background:
        radial-gradient(1000px 460px at 0% -20%, #1a2b59 0%, transparent 56%),
        radial-gradient(850px 380px at 120% 0%, #3a245f 0%, transparent 55%),
        var(--bg);
      display:grid;grid-template-rows:auto 1fr auto;
    }

    header{
      position:sticky;top:0;z-index:20;
      border-bottom:1px solid var(--border);
      background:rgba(8,12,28,.78);backdrop-filter:blur(8px);
    }
    .topbar{
      max-width:1240px;margin:0 auto;padding:.9rem 1rem;
      display:flex;align-items:center;justify-content:space-between;gap:.8rem;
    }
    .brand{display:flex;align-items:center;gap:.65rem;font-weight:700}
    .logo{
      width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#102047;font-weight:800;font-size:.85rem;
    }
    .pill{
      font-size:.77rem;padding:.24rem .62rem;border-radius:999px;font-weight:700;
      color:#1e1b4b;background:linear-gradient(135deg,#bfdbfe,#ddd6fe);
    }

    main{
      max-width:1240px;width:100%;margin:0 auto;padding:1rem;
      display:grid;place-items:center;
    }

    .auth-card{
      width:100%;max-width:520px;
      border:1px solid var(--border);border-radius:16px;
      background:linear-gradient(180deg,rgba(26,38,70,.84),rgba(15,23,45,.93));
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      overflow:hidden;
    }

    .tabs{
      display:grid;grid-template-columns:1fr 1fr;
      border-bottom:1px solid var(--border);
      background:rgba(19,31,63,.95);
    }
    .tab-btn{
      appearance:none;border:none;background:transparent;color:var(--muted);
      padding:.9rem 1rem;font-weight:650;cursor:pointer;transition:.2s;
    }
    .tab-btn:hover{color:#d9e2ff;background:rgba(96,165,250,.08)}
    .tab-btn.active{
      color:var(--text);
      background:rgba(167,139,250,.14);
      box-shadow:inset 0 -2px 0 var(--focus);
    }

    .panel{display:none;padding:1rem}
    .panel.active{display:block}

    .intro{color:var(--muted);font-size:.91rem;line-height:1.45;margin-bottom:.85rem}
    .field{margin-bottom:.8rem}
    label{display:block;margin-bottom:.34rem;font-size:.84rem;color:#c9d4f5}
    input,select{
      width:100%;border:1px solid #3b5496;background:#101a36;color:var(--text);
      border-radius:10px;padding:.6rem .62rem;font-size:.9rem;
    }
    input:focus,select:focus{
      outline:none;border-color:var(--focus);box-shadow:0 0 0 2px rgba(56,189,248,.2);
    }

    .pw-wrap{position:relative}
    .pw-toggle{
      position:absolute;right:.45rem;top:50%;transform:translateY(-50%);
      border:none;background:transparent;color:#c7d2fe;font-size:.8rem;cursor:pointer;
      border-radius:6px;padding:.18rem .35rem;
    }
    .pw-toggle:hover{background:rgba(99,102,241,.16)}

    .cta{
      width:100%;border:none;border-radius:10px;cursor:pointer;
      padding:.7rem .8rem;font-weight:700;
      background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#0f1f49;
      margin-top:.25rem;
    }
    .cta:hover{filter:brightness(1.06)}

    .support-row{
      margin-top:.75rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem;
      font-size:.83rem;color:var(--muted)
    }
    a{color:#bfdbfe;text-decoration:none}
    a:hover{text-decoration:underline}

    .message{margin-top:.72rem;min-height:1.2rem;font-size:.84rem;color:var(--muted)}
    .message.error{color:var(--danger)}
    .message.success{color:var(--ok)}

    footer{
      border-top:1px solid var(--border);color:var(--muted);font-size:.8rem;
      text-align:center;padding:.9rem 1rem 1.2rem;
    }
    .footer-links{
      display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin-top:.25rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">TP</div>
        <span>Theater Portal Authentication</span>
        <span class="pill">ACCESS</span>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-card" aria-label="Authentication gateway">
      <div class="tabs" role="tablist" aria-label="Authentication tabs">
        <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="signin-panel" id="signin-tab">Sign In</button>
        <button class="tab-btn" role="tab" aria-selected="false" aria-controls="signup-panel" id="signup-tab">Sign Up</button>
      </div>

      <div class="panel active" id="signin-panel" role="tabpanel" aria-labelledby="signin-tab">
        <p class="intro">Sign in to access your role-specific workspace.</p>
        <form id="signin-form" novalidate>
          <div class="field">
            <label for="signin-email">Email Address</label>
            <input id="signin-email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field pw-wrap">
            <label for="signin-password">Password</label>
            <input id="signin-password" name="password" type="password" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" data-target="signin-password" aria-label="Show password">Show</button>
          </div>

          <button type="submit" class="cta">Log In</button>

          <div class="support-row">
            <span>Need account access help?</span>
            <a href="/help.html">Need Help?</a>
          </div>
          <div class="support-row">
            <span></span>
            <a href="#" id="forgot-link">Forgot Password?</a>
          </div>

          <p class="message" id="signin-message" aria-live="polite"></p>
        </form>
      </div>

      <div class="panel" id="signup-panel" role="tabpanel" aria-labelledby="signup-tab">
        <p class="intro">Create your account and choose your portal role.</p>
        <form id="signup-form" novalidate>
          <div class="field">
            <label for="signup-email">Email Address</label>
            <input id="signup-email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field pw-wrap">
            <label for="signup-password">Password</label>
            <input id="signup-password" name="password" type="password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="pw-toggle" data-target="signup-password" aria-label="Show password">Show</button>
          </div>
          <div class="field">
            <label for="signup-role">I am joining as</label>
            <select id="signup-role" name="role" required>
              <option value="" selected disabled>Select role</option>
              <option value="volunteer">Volunteer</option>
              <option value="cast">Cast Member</option>
              <option value="admin">Admin / Staff</option>
            </select>
          </div>

          <button type="submit" class="cta">Create Account</button>
          <p class="message" id="signup-message" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer>
    © <span id="year"></span> Theater Portal
    <div class="footer-links">
      <a href="/privacy-policy.html">Privacy Policy</a>
      <a href="/help.html">Need Help?</a>
    </div>
  </footer>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== Requested Supabase credentials =====
    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_xfsIVVSH8vcUz9XfZgirwA_wl-GSYOw";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ===== Role redirects =====
    const ROLE_REDIRECTS = {
      volunteer: '/volunteer-portal.html',
      cast: '/cast-selection-portal.html',
      admin: '/dashboard.html',
      staff: '/dashboard.html',
      manager: '/dashboard.html',
      default: '/dashboard.html'
    };

    const $ = (id) => document.getElementById(id);
    const setMsg = (el, msg, type = '') => {
      el.textContent = msg;
      el.className = `message ${type}`.trim();
    };

    function safeRole(role) {
      return String(role || '').trim().toLowerCase();
    }

    function roleRoute(role) {
      const r = safeRole(role);
      return ROLE_REDIRECTS[r] || ROLE_REDIRECTS.default;
    }

    function persistSession(sessionObj) {
      try {
        localStorage.setItem('portal_session', JSON.stringify(sessionObj));
      } catch (_) {}
    }

    async function getUserRole(userId) {
      // Requires table: profiles (id uuid pk references auth.users(id), role text)
      const { data, error } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', userId)
        .single();

      if (error) throw error;
      return safeRole(data?.role);
    }

    async function ensureProfileRole(userId, role) {
      const normalizedRole = safeRole(role) || 'volunteer';

      const { error } = await supabase
        .from('profiles')
        .upsert(
          { id: userId, role: normalizedRole, updated_at: new Date().toISOString() },
          { onConflict: 'id' }
        );

      if (error) throw error;
      return normalizedRole;
    }

    function setupTabs() {
      const signInTab = $('signin-tab');
      const signUpTab = $('signup-tab');
      const signInPanel = $('signin-panel');
      const signUpPanel = $('signup-panel');

      function activate(tab) {
        const isSignIn = tab === 'signin';
        signInTab.classList.toggle('active', isSignIn);
        signUpTab.classList.toggle('active', !isSignIn);
        signInTab.setAttribute('aria-selected', String(isSignIn));
        signUpTab.setAttribute('aria-selected', String(!isSignIn));
        signInPanel.classList.toggle('active', isSignIn);
        signUpPanel.classList.toggle('active', !isSignIn);
      }

      signInTab.addEventListener('click', () => activate('signin'));
      signUpTab.addEventListener('click', () => activate('signup'));
    }

    function setupPasswordToggles() {
      document.querySelectorAll('.pw-toggle').forEach((btn) => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.getAttribute('data-target'));
          if (!target) return;
          const show = target.type === 'password';
          target.type = show ? 'text' : 'password';
          btn.textContent = show ? 'Hide' : 'Show';
        });
      });
    }

    async function routeCurrentSessionIfExists() {
      const { data: { session }, error } = await supabase.auth.getSession();
      if (error || !session?.user) return;

      try {
        const role = await getUserRole(session.user.id);
        const chosenRole = role || 'volunteer';

        persistSession({
          user: { id: session.user.id, email: session.user.email },
          role: chosenRole,
          token: session.access_token || null,
          expiresAt: session.expires_at || null
        });

        window.location.assign(roleRoute(chosenRole));
      } catch (_) {
        // If role lookup fails, keep user on auth page
      }
    }

    function setupForms() {
      const signInForm = $('signin-form');
      const signUpForm = $('signup-form');
      const signInMsg = $('signin-message');
      const signUpMsg = $('signup-message');

      signInForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        setMsg(signInMsg, 'Signing in...');

        const email = $('signin-email').value.trim();
        const password = $('signin-password').value;

        if (!email || !password) {
          setMsg(signInMsg, 'Email and password are required.', 'error');
          return;
        }

        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;

          const user = data?.user;
          const session = data?.session;
          if (!user) throw new Error('No user returned from sign in.');

          const role = (await getUserRole(user.id)) || 'volunteer';

          persistSession({
            user: { id: user.id, email: user.email },
            role,
            token: session?.access_token || null,
            expiresAt: session?.expires_at || null
          });

          setMsg(signInMsg, 'Success! Redirecting...', 'success');
          window.location.assign(roleRoute(role));
        } catch (err) {
          setMsg(signInMsg, err?.message || 'Sign-in failed.', 'error');
        }
      });

      signUpForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        setMsg(signUpMsg, 'Creating account...');

        const email = $('signup-email').value.trim();
        const password = $('signup-password').value;
        const selectedRole = $('signup-role').value;

        if (!email || !password || !selectedRole) {
          setMsg(signUpMsg, 'Please complete all fields.', 'error');
          return;
        }
        if (password.length < 8) {
          setMsg(signUpMsg, 'Password must be at least 8 characters.', 'error');
          return;
        }

        try {
          const { data, error } = await supabase.auth.signUp({
            email,
            password
          });
          if (error) throw error;

          const user = data?.user;
          const session = data?.session;

          if (!user) {
            setMsg(signUpMsg, 'Signup successful. Check your email to verify your account, then sign in.', 'success');
            return;
          }

          const role = await ensureProfileRole(user.id, selectedRole);

          persistSession({
            user: { id: user.id, email: user.email },
            role,
            token: session?.access_token || null,
            expiresAt: session?.expires_at || null
          });

          if (!session) {
            setMsg(signUpMsg, 'Account created. Please verify your email, then sign in.', 'success');
            return;
          }

          setMsg(signUpMsg, 'Account created! Redirecting...', 'success');
          window.location.assign(roleRoute(role));
        } catch (err) {
          setMsg(signUpMsg, err?.message || 'Sign-up failed.', 'error');
        }
      });
    }

    function setupForgotPassword() {
      const link = $('forgot-link');
      const signInMsg = $('signin-message');

      link.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = $('signin-email').value.trim();
        if (!email) {
          setMsg(signInMsg, 'Enter your email first, then click Forgot Password.', 'error');
          return;
        }

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/portal-auth.html'
          });
          if (error) throw error;
          setMsg(signInMsg, 'Password reset email sent. Check your inbox.', 'success');
        } catch (err) {
          setMsg(signInMsg, err?.message || 'Unable to send reset email.', 'error');
        }
      });
    }

    async function init() {
      $('year').textContent = new Date().getFullYear();
      setupTabs();
      setupPasswordToggles();
      setupForms();
      setupForgotPassword();
      await routeCurrentSessionIfExists();
    }

    init();
  </script>
</body>
</html>
