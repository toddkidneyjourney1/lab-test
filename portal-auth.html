<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theater Portal Authentication</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --primary: #22c55e;
      --primary-hover: #16a34a;
      --danger: #ef4444;
      --border: #1f2937;
      --focus: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: 100%;
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.65);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .brand {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #22c55e, #0ea5e9);
      color: #052e16;
      font-weight: 800;
      font-size: 0.95rem;
    }

    .brand h1 {
      font-size: 1.05rem;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    .auth-card {
      width: 100%;
      max-width: 460px;
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.95);
      border-radius: 16px;
      box-shadow: 0 10px 45px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
      background: #0b1220;
    }

    .tab-btn {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 0.85rem 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .tab-btn:hover {
      color: #cbd5e1;
      background: rgba(148, 163, 184, 0.08);
    }

    .tab-btn.active {
      color: var(--text);
      background: rgba(56, 189, 248, 0.08);
      box-shadow: inset 0 -2px 0 var(--focus);
    }

    .panel {
      display: none;
      padding: 1.15rem 1rem 1rem;
    }

    .panel.active {
      display: block;
    }

    .intro {
      margin-bottom: 0.95rem;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .field {
      margin-bottom: 0.85rem;
    }

    label {
      display: inline-block;
      margin-bottom: 0.35rem;
      font-size: 0.88rem;
      color: #cbd5e1;
      font-weight: 550;
    }

    input, select {
      width: 100%;
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--text);
      border-radius: 10px;
      padding: 0.72rem 0.78rem;
      font-size: 0.95rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.22);
    }

    .pw-wrap {
      position: relative;
    }

    .pw-toggle {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #93c5fd;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 0.2rem 0.3rem;
      border-radius: 6px;
    }

    .pw-toggle:hover {
      background: rgba(147, 197, 253, 0.14);
      color: #dbeafe;
    }

    .cta {
      width: 100%;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #052e16;
      font-weight: 700;
      padding: 0.76rem 0.85rem;
      cursor: pointer;
      transition: transform 0.04s ease, background 0.2s ease;
      margin-top: 0.25rem;
    }

    .cta:hover { background: var(--primary-hover); }
    .cta:active { transform: translateY(1px); }

    .support-row {
      margin-top: 0.85rem;
      text-align: right;
      font-size: 0.84rem;
    }

    .support-row a,
    footer a {
      color: #7dd3fc;
      text-decoration: none;
    }

    .support-row a:hover,
    footer a:hover { text-decoration: underline; }

    .message {
      margin-top: 0.85rem;
      font-size: 0.86rem;
      line-height: 1.42;
      color: var(--muted);
      min-height: 1.3rem;
    }

    .message.error { color: #fca5a5; }
    .message.success { color: #86efac; }

    footer {
      border-top: 1px solid var(--border);
      padding: 0.9rem 1rem 1.2rem;
      color: var(--muted);
      text-align: center;
      font-size: 0.82rem;
    }

    .footer-links {
      display: inline-flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true">TP</div>
      <h1>Theater Portal</h1>
    </div>
  </header>

  <main>
    <section class="auth-card" aria-label="Authentication gateway">
      <div class="tabs" role="tablist" aria-label="Authentication tabs">
        <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="signin-panel" id="signin-tab">Sign In</button>
        <button class="tab-btn" role="tab" aria-selected="false" aria-controls="signup-panel" id="signup-tab">Sign Up</button>
      </div>

      <div class="panel active" id="signin-panel" role="tabpanel" aria-labelledby="signin-tab">
        <p class="intro">Sign in to access your role-specific workspace.</p>
        <form id="signin-form" novalidate>
          <div class="field">
            <label for="signin-email">Email Address</label>
            <input id="signin-email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field pw-wrap">
            <label for="signin-password">Password</label>
            <input id="signin-password" name="password" type="password" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" data-target="signin-password" aria-label="Show password">Show</button>
          </div>
          <button type="submit" class="cta">Log In</button>
          <div class="support-row">
            <a href="/forgot-password.html">Forgot Password?</a>
          </div>
          <p class="message" id="signin-message" aria-live="polite"></p>
        </form>
      </div>

      <div class="panel" id="signup-panel" role="tabpanel" aria-labelledby="signup-tab">
        <p class="intro">Create your account and select your portal role.</p>
        <form id="signup-form" novalidate>
          <div class="field">
            <label for="signup-email">Email Address</label>
            <input id="signup-email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field pw-wrap">
            <label for="signup-password">Password</label>
            <input id="signup-password" name="password" type="password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="pw-toggle" data-target="signup-password" aria-label="Show password">Show</button>
          </div>
          <div class="field">
            <label for="signup-role">I am joining as</label>
            <select id="signup-role" name="role" required>
              <option value="" selected disabled>Select role</option>
              <option value="volunteer">Volunteer</option>
              <option value="cast">Cast Member</option>
              <option value="admin">Admin / Staff</option>
            </select>
          </div>
          <button type="submit" class="cta">Create Account</button>
          <p class="message" id="signup-message" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div>© <span id="year"></span> Theater Portal</div>
    <div class="footer-links">
      <a href="/privacy-policy.html">Privacy Policy</a>
      <a href="/help.html">Need Help?</a>
    </div>
  </footer>

  <script>
    // ===== Config: replace endpoints with your backend routes =====
    const AUTH_ENDPOINTS = {
      signIn: '/api/auth/signin',
      signUp: '/api/auth/signup',
      session: '/api/auth/session'
    };

    // ===== Role-based redirect map (RBAC decision engine) =====
    const ROLE_REDIRECTS = {
      volunteer: '/volunteer-portal.html',
      cast: '/cast-selection-portal.html',
      admin: '/dashboard.html',
      default: '/dashboard.html'
    };

    // Utilities
    const $ = (id) => document.getElementById(id);
    const setMsg = (el, msg, type = '') => {
      el.textContent = msg;
      el.className = `message ${type}`.trim();
    };

    function safeRoleToRedirect(role) {
      if (!role) return ROLE_REDIRECTS.default;
      const normalized = String(role).trim().toLowerCase();
      return ROLE_REDIRECTS[normalized] || ROLE_REDIRECTS.default;
    }

    function persistSession(session) {
      // NOTE: For production, prefer HTTP-only secure cookies from backend.
      // This localStorage fallback is only a UX/session convenience layer.
      try {
        localStorage.setItem('portal_session', JSON.stringify({
          token: session.token || null,
          role: session.role || null,
          user: session.user || null,
          expiresAt: session.expiresAt || null
        }));
      } catch (_) {
        // Storage unavailable (private mode or disabled)
      }
    }

    function getPersistedSession() {
      try {
        const raw = localStorage.getItem('portal_session');
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function redirectByRole(role) {
      window.location.assign(safeRoleToRedirect(role));
    }

    async function signIn({ email, password }) {
      const res = await fetch(AUTH_ENDPOINTS.signIn, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'Sign-in failed. Please verify your credentials.');
      }
      return res.json();
    }

    async function signUp({ email, password, role }) {
      const res = await fetch(AUTH_ENDPOINTS.signUp, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password, role })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'Sign-up failed. Please try again.');
      }
      return res.json();
    }

    async function validateExistingSession() {
      // Optional backend check on page load; if session valid, skip auth screen.
      try {
        const res = await fetch(AUTH_ENDPOINTS.session, {
          method: 'GET',
          credentials: 'include'
        });
        if (!res.ok) return null;
        return res.json();
      } catch (_) {
        return null;
      }
    }

    function setupTabs() {
      const signInTab = $('signin-tab');
      const signUpTab = $('signup-tab');
      const signInPanel = $('signin-panel');
      const signUpPanel = $('signup-panel');

      function activate(tab) {
        const signInActive = tab === 'signin';

        signInTab.classList.toggle('active', signInActive);
        signUpTab.classList.toggle('active', !signInActive);

        signInTab.setAttribute('aria-selected', String(signInActive));
        signUpTab.setAttribute('aria-selected', String(!signInActive));

        signInPanel.classList.toggle('active', signInActive);
        signUpPanel.classList.toggle('active', !signInActive);
      }

      signInTab.addEventListener('click', () => activate('signin'));
      signUpTab.addEventListener('click', () => activate('signup'));
    }

    function setupPasswordToggles() {
      document.querySelectorAll('.pw-toggle').forEach((btn) => {
        btn.addEventListener('click', () => {
          const targetId = btn.getAttribute('data-target');
          const input = document.getElementById(targetId);
          if (!input) return;
          const showing = input.type === 'text';
          input.type = showing ? 'password' : 'text';
          btn.textContent = showing ? 'Show' : 'Hide';
          btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        });
      });
    }

    function setupForms() {
      const signInForm = $('signin-form');
      const signUpForm = $('signup-form');
      const signInMsg = $('signin-message');
      const signUpMsg = $('signup-message');

      signInForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        setMsg(signInMsg, 'Signing in...');

        const email = $('signin-email').value.trim();
        const password = $('signin-password').value;

        if (!email || !password) {
          setMsg(signInMsg, 'Email and password are required.', 'error');
          return;
        }

        try {
          const data = await signIn({ email, password });
          // Expected shape: { token?, role, user?, expiresAt? }
          persistSession(data);
          setMsg(signInMsg, 'Success! Redirecting...', 'success');
          redirectByRole(data.role);
        } catch (err) {
          setMsg(signInMsg, err.message || 'Unable to sign in.', 'error');
        }
      });

      signUpForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        setMsg(signUpMsg, 'Creating account...');

        const email = $('signup-email').value.trim();
        const password = $('signup-password').value;
        const role = $('signup-role').value;

        if (!email || !password || !role) {
          setMsg(signUpMsg, 'Please complete all fields.', 'error');
          return;
        }

        if (password.length < 8) {
          setMsg(signUpMsg, 'Password must be at least 8 characters.', 'error');
          return;
        }

        try {
          const data = await signUp({ email, password, role });
          persistSession(data);
          setMsg(signUpMsg, 'Account created! Redirecting...', 'success');
          redirectByRole(data.role || role);
        } catch (err) {
          setMsg(signUpMsg, err.message || 'Unable to create account.', 'error');
        }
      });
    }

    async function initAuthGateway() {
      $('year').textContent = new Date().getFullYear();
      setupTabs();
      setupPasswordToggles();
      setupForms();

      // UX optimization: if session already exists, route immediately
      const persisted = getPersistedSession();
      if (persisted && persisted.role) {
        redirectByRole(persisted.role);
        return;
      }

      // Optional backend session validation
      const existing = await validateExistingSession();
      if (existing && existing.role) {
        persistSession(existing);
        redirectByRole(existing.role);
      }
    }

    initAuthGateway();
  </script>
</body>
</html>
