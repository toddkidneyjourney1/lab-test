<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Laboratory Theater of Florida | Volunteer Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-wrap {
      max-width: 560px;
      margin: 2.5rem auto 3rem;
      padding: 0 1rem;
    }

    .auth-card {
      background: #151515;
      border: 1px solid #2c2c2c;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #2c2c2c;
      background: #101010;
    }

    .auth-tab {
      border: 0;
      background: transparent;
      color: #d8d8d8;
      padding: 0.9rem 1rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
    }

    .auth-tab.active {
      color: #fff;
      box-shadow: inset 0 -2px 0 #ff5c8a;
      background: #171717;
    }

    .auth-panel { padding: 1rem; }

    .auth-intro {
      color: #cfcfcf;
      margin-bottom: 0.85rem;
      line-height: 1.45;
    }

    .field { margin-bottom: 0.8rem; }
    .field label {
      display: block;
      margin-bottom: 0.34rem;
      color: #f3f3f3;
      font-size: 0.9rem;
    }

    .field input {
      width: 100%;
      border: 1px solid #3a3a3a;
      background: #0f0f0f;
      color: #fff;
      border-radius: 10px;
      padding: 0.62rem 0.7rem;
      font-size: 0.95rem;
      box-sizing: border-box;
    }

    .field input:focus {
      outline: none;
      border-color: #ff5c8a;
      box-shadow: 0 0 0 2px rgba(255, 92, 138, 0.2);
    }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 0.45rem;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #ff8dad;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0.15rem 0.35rem;
      border-radius: 6px;
    }
    .pw-toggle:hover { background: rgba(255, 92, 138, 0.14); }

    .btn-auth {
      display: inline-block;
      border: 0;
      border-radius: 10px;
      background: #ff5c8a;
      color: #fff;
      font-weight: 700;
      padding: 0.68rem 0.9rem;
      cursor: pointer;
      width: 100%;
      margin-top: 0.2rem;
    }
    .btn-auth:hover { filter: brightness(1.06); }
    .btn-auth:disabled { opacity: 0.7; cursor: not-allowed; }

    .support-row {
      margin-top: 0.75rem;
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.86rem;
      color: #d0d0d0;
    }

    .support-row a { color: #ff7fa6; text-decoration: none; }
    .support-row a:hover { text-decoration: underline; }

    .message {
      margin-top: 0.75rem;
      min-height: 1.2rem;
      color: #cfcfcf;
      font-size: 0.88rem;
    }
    .message.error { color: #ff8f8f; }
    .message.success { color: #8ff0b4; }
  </style>
</head>
<body>
  <input type="checkbox" id="nav-toggle" class="nav-toggle" />
  <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
  <label for="nav-toggle" class="nav-overlay"></label>

  <nav class="hamburger-menu">
    <a href="about.html">Origin Story</a>
    <a href="archive25.html">Past Experiments</a>
    <a href="index.html">Back to the Slab</a>
    <a href="plan.html">Lab Protocols</a>
    <a href="cast-portal.html">The Portal Landing Pad</a>
    <a href="portal-landingl.html">Portals</a>
    <a href="support.html">Fuel the Innovation</a>
    <a href="sponsors.html">Core Collaborators</a>
  </nav>

  <header>
    <div class="logo">
      THE <span>LAB</span>
      <p class="tagline">Intentionally innovative live theater</p>
    </div>
  </header>

  <main>
    <section class="auth-wrap">
      <div class="auth-card" aria-label="Volunteer authentication">
        <div class="auth-tabs" aria-label="Auth tabs">
          <span class="auth-tab active">Volunteer Sign In</span>
          <a class="auth-tab" href="volunteer-signup.html" aria-label="Go to Volunteer Signup">Sign Up</a>
        </div>

        <section class="auth-panel">
          <p class="auth-intro">Sign in to access the volunteer portal.</p>

          <form id="signin-form" novalidate>
            <div class="field">
              <label for="signin-email">Email Address</label>
              <input id="signin-email" type="email" autocomplete="email" required />
            </div>

            <div class="field pw-wrap">
              <label for="signin-password">Password</label>
              <input id="signin-password" type="password" autocomplete="current-password" required />
              <button type="button" class="pw-toggle" data-target="signin-password">Show</button>
            </div>

            <button id="login-btn" type="submit" class="btn-auth">Log In</button>

            <div class="support-row">
              <a href="#" id="forgot-link">Forgot Password?</a>
              <a href="support.html">Need Help?</a>
            </div>

            <p class="message" id="signin-message" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </section>
  </main>

  <!-- Footer removed per request -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_xfsIVVSH8vcUz9XfZgirwA_wl-GSYOw";

    if (!window.supabase || !window.supabase.createClient) {
      alert("Supabase failed to load. Please refresh and try again.");
      throw new Error("Supabase library not loaded");
    }

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);

    function setMessage(el, text, type = "") {
      el.textContent = text;
      el.className = `message ${type}`.trim();
    }

    function normalizeRole(role) {
      return String(role || "").trim().toLowerCase();
    }

    async function getProfileRole(userId) {
      const { data, error } = await supabase
        .from("profiles")
        .select("role")
        .eq("id", userId)
        .maybeSingle();

      if (error) throw error;
      return normalizeRole(data?.role);
    }

    function setupPasswordToggle() {
      document.querySelectorAll(".pw-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const target = document.getElementById(btn.getAttribute("data-target"));
          if (!target) return;
          const hidden = target.type === "password";
          target.type = hidden ? "text" : "password";
          btn.textContent = hidden ? "Hide" : "Show";
        });
      });
    }

    function setupForgotPassword() {
      const link = $("forgot-link");
      const msg = $("signin-message");

      link.addEventListener("click", async (e) => {
        e.preventDefault();
        const email = $("signin-email").value.trim();

        if (!email) {
          setMessage(msg, "Enter your email first, then click Forgot Password.", "error");
          return;
        }

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + "/portal-auth.html"
          });
          if (error) throw error;
          setMessage(msg, "Password reset email sent.", "success");
        } catch (err) {
          setMessage(msg, err.message || "Could not send reset email.", "error");
        }
      });
    }

    function setupSignInForm() {
      const form = $("signin-form");
      const msg = $("signin-message");
      const loginBtn = $("login-btn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = $("signin-email").value.trim();
        const password = $("signin-password").value;

        if (!email || !password) {
          setMessage(msg, "Email and password are required.", "error");
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";
        setMessage(msg, "Signing in...");

        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;

          const user = data?.user;
          if (!user) throw new Error("No user returned from sign in.");

          const role = await getProfileRole(user.id);

          if (role !== "volunteer") {
            await supabase.auth.signOut();
            throw new Error("This login is for volunteers only.");
          }

          setMessage(msg, "Success! Redirecting...", "success");
          window.location.assign("volunteer-portal.html");
        } catch (err) {
          setMessage(msg, err.message || "Sign in failed.", "error");
          loginBtn.disabled = false;
          loginBtn.textContent = "Log In";
        }
      });
    }

    async function redirectIfAlreadyLoggedIn() {
      const { data, error } = await supabase.auth.getSession();
      if (error) return;
      const user = data?.session?.user;
      if (!user) return;

      try {
        const role = await getProfileRole(user.id);
        if (role === "volunteer") {
          window.location.assign("volunteer-portal.html");
        }
      } catch (_) {
        // stay on page if role check fails
      }
    }

    async function init() {
      setupPasswordToggle();
      setupForgotPassword();
      setupSignInForm();
      await redirectIfAlreadyLoggedIn();
    }

    init();
  </script>
</body>
</html>
