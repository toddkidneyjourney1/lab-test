<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Landing | The Laboratory Theater of Florida</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }
    .card {
      background: #151515;
      border: 1px solid #2c2c2c;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2,
    .card h3 {
      margin-top: 0;
    }
    .muted { color: #cfcfcf; }
    .status {
      margin: 1rem 0;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid #3a3a3a;
      background: #101010;
    }
    .status.error {
      border-color: #7a2b2b;
      color: #ffd8d8;
      background: #1a0f0f;
    }
    .actions,
    .portal-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .portal-grid {
      margin-top: 1rem;
    }
    .portal-card {
      flex: 1 1 260px;
    }
    .btn {
      appearance: none;
      border: 1px solid #444;
      border-radius: 999px;
      padding: 0.55rem 1rem;
      text-decoration: none;
      color: inherit;
      background: #1a1a1a;
      cursor: pointer;
      display: inline-block;
    }
    .btn-primary {
      border-color: #ff5c8a;
      background: #ff5c8a;
      color: #121212;
      font-weight: 700;
    }
    .hidden {
      display: none !important;
    }
    code {
      background: #111;
      border: 1px solid #2d2d2d;
      border-radius: 6px;
      padding: 0.1rem 0.35rem;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-config.js"></script>
</head>
<body>
  <main class="container">
    <h1>Portal Authentication Gateway</h1>
    <p class="muted">Sign in with Supabase Auth to access the cast, volunteer, or admin portal assigned to your account.</p>

    <div id="status" class="status">Checking your Supabase session…</div>

    <section class="card">
      <h2>Your Access</h2>
      <p id="user-summary" class="muted">Not signed in.</p>
    </section>

    <section class="card">
      <h2>Portal Access</h2>
      <div id="portal-options" class="portal-grid"></div>
      <div id="request-access" class="portal-grid hidden"></div>
    </section>

    <section class="card">
      <h2>Session Actions</h2>
      <div class="actions">
        <a class="btn btn-primary" href="sign-in.html?redirect_url=portal-landing.html" id="signInLink">Sign in</a>
        <button class="btn hidden" id="signOutBtn" type="button">Sign out</button>
      </div>
    </section>
  </main>

  <script>
    const PORTALS = {
      cast: {
        title: 'Cast Portal',
        description: 'Review cast materials and production updates.',
        href: 'cast-portal.html',
        button: 'Enter Cast Portal'
      },
      volunteer: {
        title: 'Volunteer Portal',
        description: 'Manage volunteer shifts and signups.',
        href: 'volunteer-portal.html',
        button: 'Enter Volunteer Portal'
      },
      admin: {
        title: 'Admin Portal',
        description: 'Access internal administration tools.',
        href: 'admin-portal.html',
        button: 'Enter Admin Portal'
      }
    };

    const REQUEST_ACCESS_EMAIL = 'office@laboratorytheaterflorida.com';
    const REQUEST_ACCESS_URL = (() => {
      const params = new URLSearchParams({
        subject: 'Request Portal Access',
        body: 'Hello Lab Theater,\n\nI am signed in but do not have a portal role yet. Please assign the correct access.\n'
      });
      return `mailto:${REQUEST_ACCESS_EMAIL}?${params.toString()}`;
    })();

    const statusEl = document.getElementById('status');
    const userSummaryEl = document.getElementById('user-summary');
    const portalOptionsEl = document.getElementById('portal-options');
    const requestAccessEl = document.getElementById('request-access');
    const signInLink = document.getElementById('signInLink');
    const signOutBtn = document.getElementById('signOutBtn');

    signInLink.href = window.labAuth.buildSignInUrl('portal-landing.html');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', !!isError);
    }

    function clearPortalOptions() {
      portalOptionsEl.innerHTML = '';
      requestAccessEl.innerHTML = '';
      requestAccessEl.classList.add('hidden');
    }

    function setSignedOutState() {
      clearPortalOptions();
      userSummaryEl.textContent = 'Not signed in.';
      signInLink.classList.remove('hidden');
      signOutBtn.classList.add('hidden');
    }

    function renderPortalCard(config) {
      const card = document.createElement('article');
      card.className = 'card portal-card';

      const title = document.createElement('h3');
      title.textContent = config.title;
      card.appendChild(title);

      const description = document.createElement('p');
      description.className = 'muted';
      description.textContent = config.description;
      card.appendChild(description);

      const link = document.createElement('a');
      link.className = 'btn btn-primary';
      link.href = config.href;
      link.textContent = config.button;
      card.appendChild(link);

      portalOptionsEl.appendChild(card);
    }

    function renderRequestAccessCard() {
      requestAccessEl.classList.remove('hidden');

      const card = document.createElement('article');
      card.className = 'card portal-card';

      const title = document.createElement('h3');
      title.textContent = 'Request Access';
      card.appendChild(title);

      const description = document.createElement('p');
      description.className = 'muted';
      description.textContent = 'Your account is authenticated, but no portal role has been assigned yet.';
      card.appendChild(description);

      const link = document.createElement('a');
      link.className = 'btn';
      link.href = REQUEST_ACCESS_URL;
      link.textContent = 'Request Access';
      card.appendChild(link);

      requestAccessEl.appendChild(card);
    }

    async function boot() {
      try {
        const user = await window.labAuth.getUser();

        if (!user) {
          setSignedOutState();
          setStatus('You are not signed in. Use the Sign in button to continue.');
          return;
        }

        signInLink.classList.add('hidden');
        signOutBtn.classList.remove('hidden');

        const profile = await window.labAuth.getProfile(user.id);
        const role = window.labAuth.normalizeRole(profile?.role);
        const displayName = window.labAuth.getUserDisplayName(user, profile);

        userSummaryEl.textContent = `${displayName}${user.email ? ` · ${user.email}` : ''}`;
        clearPortalOptions();

        if (!role || !PORTALS[role]) {
          renderRequestAccessCard();
          setStatus('Signed in successfully, but no portal role is assigned to this account yet.', true);
          return;
        }

        renderPortalCard(PORTALS[role]);
        setStatus(`Signed in successfully. Role detected: ${role}.`);
      } catch (error) {
        setSignedOutState();
        clearPortalOptions();
        setStatus(`Authentication check failed: ${error.message}`, true);
      }
    }

    signOutBtn.addEventListener('click', async () => {
      try {
        await window.labAuth.signOut();
        window.location.href = signInLink.href;
      } catch (error) {
        setStatus(`Sign out failed: ${error.message}`, true);
      }
    });

    boot();
  </script>
</body>
</html>
