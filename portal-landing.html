<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Login | The Laboratory Theater of Florida</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .card { background: var(--card-bg, #1a1a1a); border: 1px solid #333; border-radius: 10px; padding: 1.2rem; max-width: 520px; margin: 2rem auto; }
    .field { width: 100%; padding: .65rem; border-radius: 6px; border: 1px solid #444; background: #111; color: #fff; margin-top: .35rem; }
    .btn { display: inline-block; border: 0; border-radius: 6px; padding: .7rem .95rem; font-weight: 700; cursor: pointer; text-decoration: none; }
    .btn-primary { background: var(--accent, #d72638); color: #fff; }
    .btn-secondary { background: #5d6475; color: #fff; }
    .actions { display: flex; gap: .6rem; margin-top: 1rem; flex-wrap: wrap; }
    .notice { margin-top: .85rem; padding: .7rem .85rem; border-radius: 6px; font-weight: 600; }
    .success { background: #2b9a4a; color: #fff; }
    .error { background: #a33131; color: #fff; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Portal Login</h1>
    <p>Sign in or create a new account.</p>
    <div id="message"></div>

    <form id="login-form">
      <label for="email">Email</label>
      <input id="email" class="field" type="email" required />

      <label for="password" style="margin-top:.85rem;display:block;">Password</label>
      <input id="password" class="field" type="password" required />

      <div class="actions">
        <button class="btn btn-primary" type="submit">Sign In</button>
        <button id="create-btn" class="btn btn-secondary" type="button">New Account</button>
      </div>
    </form>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "Ysb_publishable_xfsIVVSH8vcUz9XfZgirwA_wl-GSYOw";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("login-form");
    const createBtn = document.getElementById("create-btn");
    const message = document.getElementById("message");

    function showMessage(text, type = "error") {
      message.innerHTML = `<div class="notice ${type}">${text}</div>`;
      setTimeout(() => message.innerHTML = "", 4500);
    }

    async function goIfAuthenticated() {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) window.location.href = "portal-selector.html";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return showMessage(error.message || "Login failed.", "error");

      showMessage("Signed in. Redirecting...", "success");
      setTimeout(() => window.location.href = "portal-selector.html", 350);
    });

    createBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password || password.length < 6) {
        return showMessage("Enter email + password (minimum 6 characters) to create account.", "error");
      }

      const { error } = await supabase.auth.signUp({ email, password });
      if (error) return showMessage(error.message || "Sign up failed.", "error");

      showMessage("Account created. Check email for verification if enabled, then sign in.", "success");
    });

    goIfAuthenticated();
  </script>
</body>
</html>
