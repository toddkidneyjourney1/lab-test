<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Portal | The Laboratory Theater of Florida</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .show-card {
      background: var(--card-bg);
      padding: 1.25rem;
      border-radius: 8px;
      border: 1px solid #333;
      margin-bottom: 1rem;
    }
    .show-card h3 { margin-top: 0; color: var(--accent); }
    .show-meta { margin: 0.5rem 0 0.25rem; font-size: 0.95rem; color: #ddd; }
    .notice { padding: 0.8rem 1rem; border-radius: 6px; margin: 0.75rem 0; font-weight: 600; }
    .notice.success { background: #2b9a4a; color: #fff; }
    .notice.error { background: #a33131; color: #fff; }
    .loading { text-align: center; padding: 1.5rem; color: #ddd; }
  </style>
</head>
<body>
  <input type="checkbox" id="nav-toggle" class="nav-toggle" />
  <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
  <nav class="hamburger-menu">
    <a href="about.html">Origin Story</a>
    <a href="archive25.html">Past Experiments</a>
    <a href="index.html">Back to the Slab</a>
    <a href="plan.html">Lab Protocols</a>
    <a href="portal-landing.html">Portal Landing</a>
    <a href="support.html">Fuel the Innovation</a>
    <a href="sponsors.html">Core Collaborators</a>
  </nav>

  <header>
    <div class="logo">THE <span>LAB</span><p class="tagline">Intentionally innovative live theater</p></div>
  </header>

  <main id="cast-content">
    <h1>Cast Portal</h1>
    <p>Select your show and enter its password.</p>
    <div id="message-container"></div>
    <section id="my-shows">
      <h2>Available Cast Pages</h2>
      <div id="cast-show-container" class="production-grid"></div>
    </section>
  </main>

  <script>
    const SHOWS = [
      { title: "Fences", href: "cast-fences.html", password: "Legacy" },
      { title: "A Midsummer Night's Dream", href: "cast-midsummer.html", password: "Fantasy" },
      { title: "Bare", href: "cast-bare.html", password: "Identity" },
      { title: "God of Carnage", href: "cast-godofcarnage.html", password: "Conflict" },
      { title: "The Rivals", href: "cast-rivals.html", password: "Romance" },
      { title: "The Pillowman", href: "cast-pillowman.html", password: "Darkness" },
      { title: "Waiting for Godot", href: "cast-godot.html", password: "Absurdity" }
    ];

    function showMessage(text, type = "error") {
      const container = document.getElementById("message-container");
      container.innerHTML = `<div class="notice ${type}">${text}</div>`;
    }

    function getSessionKey(showTitle) {
      return `cast_portal_access_${showTitle}`;
    }

    function ensureShowAccess(show) {
      if (sessionStorage.getItem(getSessionKey(show.title)) === "granted") {
        return true;
      }

      const entered = window.prompt(`Enter the cast password for ${show.title}:`, "");
      if (entered === null) return false;

      if ((entered || "").trim() === show.password) {
        sessionStorage.setItem(getSessionKey(show.title), "granted");
        return true;
      }

      showMessage("Incorrect password.");
      return false;
    }

    function renderShows() {
      const container = document.getElementById("cast-show-container");
      container.innerHTML = SHOWS.map((show) => `
        <article class="show-card">
          <h3>${show.title}</h3>
          <p class="show-meta"><strong>Access:</strong> Password protected</p>
          <button class="btn primary cast-open-btn" data-title="${show.title}" data-href="${show.href}">Open Cast Page</button>
        </article>
      `).join("");

      container.querySelectorAll(".cast-open-btn").forEach((button) => {
        button.addEventListener("click", () => {
          const show = SHOWS.find((item) => item.title === button.getAttribute("data-title"));
          if (!show) return;
          if (ensureShowAccess(show)) {
            window.location.href = show.href;
          }
        });
      });
    }

    window.addEventListener("load", renderShows);
  </script>
</body>
</html>
