<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Portal | The Laboratory Theater of Florida</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hidden { display: none; }
    .panel { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .badge { display:inline-block; padding:.25rem .5rem; border-radius:999px; background:#111; color:#fff; font-size:.8rem; }
    .row { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
    button { cursor: pointer; }
  </style>
</head>
<body>
  <main style="max-width:900px;margin:2rem auto;padding:1rem;">
    <h1>Cast Portal</h1>
    <p>Secure role-based access (Clerk + Supabase)</p>

    <div id="auth-controls" class="panel">
      <div id="signed-out" class="row">
        <button id="btn-signin">Sign in</button>
      </div>

      <div id="signed-in" class="hidden">
        <p>
          Signed in as <strong id="user-email"></strong>
          <span id="role-badge" class="badge">cast</span>
        </p>
        <div class="row">
          <button id="btn-signout">Sign out</button>
        </div>
      </div>
    </div>

    <section id="admin-panel" class="panel hidden">
      <h2>Admin Panel</h2>
      <p>Full access: manage cast contacts, schedules, notes, and roles.</p>
    </section>

    <section id="sm-panel" class="panel hidden">
      <h2>Stage Manager Panel</h2>
      <p>Read/write schedules and rehearsal notes.</p>
    </section>

    <section id="cast-panel" class="panel hidden">
      <h2>Cast Panel</h2>
      <p>Read-only access to contact info and schedules.</p>
    </section>

    <pre id="debug" class="panel hidden"></pre>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Load Clerk browser SDK
    const clerkScript = document.createElement("script");
    clerkScript.src = "https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js";
    clerkScript.async = true;
    document.head.appendChild(clerkScript);

    // ===== CONFIG =====
    const CLERK_PUBLISHABLE_KEY = "pk_test_bGVhcm5pbmctbWFzdG9kb24tMzUuY2xlcmsuYWNjb3VudHMuZGV2JA";
    const CLERK_JWT_TEMPLATE = "supabase";
    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6eXR6cnhyZ25haHl2Z3dxaGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTkwNjMsImV4cCI6MjA5ODQ3NTA2M30.eRJDTZVj122qnzGPQxWWE2gxCmVXuCTukWOkfckRkMk";
    // ==================

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);
    const show = (id) => $(id).classList.remove("hidden");
    const hide = (id) => $(id).classList.add("hidden");

    function setDebug(message) {
      $("debug").textContent = message;
      show("debug");
    }

    function clearDebug() {
      $("debug").textContent = "";
      hide("debug");
    }

    function renderRole(role) {
      hide("admin-panel");
      hide("sm-panel");
      hide("cast-panel");

      if (role === "admin") show("admin-panel");
      else if (role === "stage_manager") show("sm-panel");
      else show("cast-panel");

      $("role-badge").textContent = role || "cast";
    }

    async function ensureProfile(clerkUser) {
      // Clerk user id is a string; your profiles.id is uuid in SQL example.
      // If your Clerk IDs are not UUID, switch profiles.id type to text in Supabase.
      const userId = clerkUser.id;
      const email = clerkUser?.primaryEmailAddress?.emailAddress || null;

      const { data: existing, error: selectErr } = await supabase
        .from("profiles")
        .select("id,email,role")
        .eq("id", userId)
        .maybeSingle();

      if (selectErr) throw selectErr;
      if (existing) return existing;

      const { data: created, error: insertErr } = await supabase
        .from("profiles")
        .insert({ id: userId, email, role: "cast" })
        .select("id,email,role")
        .single();

      if (insertErr) throw insertErr;
      return created;
    }

    async function setSupabaseSessionFromClerk() {
      const token = await window.Clerk.session.getToken({ template: CLERK_JWT_TEMPLATE });

      if (!token) throw new Error("Could not get Clerk token. Check JWT template name.");

      // Supabase JS expects setSession for full auth flows, but with third-party JWT
      // we can set auth header per request by re-creating client with global header.
      return createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        global: {
          headers: {
            Authorization: `Bearer ${token}`
          }
        }
      });
    }

    async function onSignedIn() {
      clearDebug();

      const clerkUser = window.Clerk.user;
      if (!clerkUser) return;

      // Use authenticated Supabase client bound to Clerk JWT
      const authedSupabase = await setSupabaseSessionFromClerk();

      const email = clerkUser?.primaryEmailAddress?.emailAddress || "(no email)";
      $("user-email").textContent = email;

      // Ensure profile exists
      const { data: existing, error: selectErr } = await authedSupabase
        .from("profiles")
        .select("id,email,role")
        .eq("id", clerkUser.id)
        .maybeSingle();

      let profile = existing;
      if (selectErr) throw selectErr;

      if (!profile) {
        const { data: created, error: insertErr } = await authedSupabase
          .from("profiles")
          .insert({ id: clerkUser.id, email, role: "cast" })
          .select("id,email,role")
          .single();
        if (insertErr) throw insertErr;
        profile = created;
      }

      hide("signed-out");
      show("signed-in");
      renderRole(profile.role);
    }

    async function onSignedOut() {
      hide("signed-in");
      show("signed-out");
      hide("admin-panel");
      hide("sm-panel");
      hide("cast-panel");
    }

    async function init() {
      await new Promise((resolve, reject) => {
        clerkScript.onload = resolve;
        clerkScript.onerror = () => reject(new Error("Failed to load Clerk SDK"));
      });

      await window.Clerk.load({ publishableKey: CLERK_PUBLISHABLE_KEY });

      $("btn-signin").addEventListener("click", async () => {
        await window.Clerk.openSignIn();
      });

      $("btn-signout").addEventListener("click", async () => {
        await window.Clerk.signOut();
        await onSignedOut();
      });

      window.Clerk.addListener(async ({ user }) => {
        try {
          if (user) await onSignedIn();
          else await onSignedOut();
        } catch (err) {
          setDebug(`Auth error: ${err.message || err}`);
        }
      });

      if (window.Clerk.user) {
        await onSignedIn();
      } else {
        await onSignedOut();
      }
    }

    init().catch((err) => setDebug(`Init error: ${err.message || err}`));
  </script>
</body>
</html>
