<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Portal | The Laboratory Theater of Florida</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .show-card {
      background: var(--card-bg);
      padding: 1.25rem;
      border-radius: 8px;
      border: 1px solid #333;
      margin-bottom: 1rem;
    }
    .show-card h3 { margin-top: 0; color: var(--accent); }
    .show-meta { margin: 0.5rem 0 0.25rem; font-size: 0.95rem; color: #ddd; }
    .notice { padding: 0.8rem 1rem; border-radius: 6px; margin: 0.75rem 0; font-weight: 600; }
    .notice.success { background: #2b9a4a; color: #fff; }
    .notice.error { background: #a33131; color: #fff; }
    .loading { text-align: center; padding: 1.5rem; color: #ddd; }
  </style>
</head>
<body>
  <input type="checkbox" id="nav-toggle" class="nav-toggle" />
  <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
  <nav class="hamburger-menu">
    <a href="about.html">Origin Story</a>
    <a href="archive25.html">Past Experiments</a>
    <a href="index.html">Back to the Slab</a>
    <a href="plan.html">Lab Protocols</a>
    <a href="portal-landing.html">Portal Landing</a>
    <a href="support.html">Fuel the Innovation</a>
    <a href="sponsors.html">Core Collaborators</a>
  </nav>

  <header>
    <div class="logo">THE <span>LAB</span><p class="tagline">Intentionally innovative live theater</p></div>
  </header>

  <main id="cast-content">
    <h1>Cast Portal</h1>
    <p>Shows assigned to you.</p>
    <div id="message-container"></div>
    <section id="my-shows">
      <h2>My Shows</h2>
      <div id="cast-show-container" class="production-grid"><p class="loading">Loading your shows...</p></div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // MUST match portal-landing + volunteer-portal
    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_xfsIVVSH8vcUz9XfZgirwA_wl-GSYOw";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showMessage(text, type = "error") {
      const container = document.getElementById("message-container");
      container.innerHTML = `<div class="notice ${type}">${text}</div>`;
    }

    function renderShows(shows) {
      const container = document.getElementById("cast-show-container");

      if (!shows.length) {
        container.innerHTML = "<p>No assigned shows found.</p>";
        return;
      }

      container.innerHTML = shows.map((show) => `
        <article class="show-card">
          <h3>${show.title ?? "Untitled Show"}</h3>
          <p class="show-meta"><strong>Date:</strong> ${show.show_date ?? "TBD"}</p>
          <p class="show-meta"><strong>Venue:</strong> ${show.venue ?? "TBD"}</p>
          <p class="show-meta"><strong>Role:</strong> ${show.cast_role ?? "Assigned Cast"}</p>
        </article>
      `).join("");
    }

    async function loadCastShows() {
      const { data: { user }, error: userErr } = await supabase.auth.getUser();
      if (userErr || !user) {
        window.location.href = "portal-landing.html";
        return;
      }

      const { data: assignments, error: assignmentError } = await supabase
        .from("cast_assignments")
        .select("show_id, cast_role")
        .eq("user_id", user.id);

      if (assignmentError) {
        showMessage("Could not load cast assignments.");
        return;
      }

      const showIds = [...new Set((assignments || []).map((a) => a.show_id).filter(Boolean))];

      if (!showIds.length) {
        renderShows([]);
        return;
      }

      const { data: shows, error: showsError } = await supabase
        .from("shows")
        .select("id, title, show_date, venue")
        .in("id", showIds)
        .order("show_date", { ascending: true });

      if (showsError) {
        showMessage("Could not load shows.");
        return;
      }

      const roleMap = new Map((assignments || []).map((a) => [a.show_id, a.cast_role]));
      const merged = (shows || []).map((s) => ({
        ...s,
        cast_role: roleMap.get(s.id) || null
      }));

      renderShows(merged);
    }

    window.addEventListener("load", loadCastShows);
  </script>
</body>
</html>
