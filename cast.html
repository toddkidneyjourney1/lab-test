<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast & Crew Portal - Laboratory Theater of Florida</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Cast & Crew Portal</h1>
    <table>
        <thead>
            <tr>
                <th>Show Title</th>
                <th>Dates</th>
                <th>Rehearsal Schedule</th>
                <th>Contact Sheet</th>
                <th>Communication</th>
            </tr>
        </thead>
        <tbody id="portal-body"></tbody>
    </table>

    <script>
        const shows = [
            { title: "Alien: The Musical Parody", dates: "June 7, 2024 – June 29, 2024" },
            { title: "Squirrel Girl Goes to College", dates: "July 11, 2024 – July 14, 2024" },
            { title: "Clyde's", dates: "July 26, 2024 – August 11, 2024" },
            { title: "Gutenberg! The Musical!", dates: "September 13, 2024 – September 29, 2024" },
            { title: "Dracula: A Comedy of Terrors", dates: "October 18, 2024 – November 9, 2024" },
            { title: "Christmas With the Crawfords", dates: "December 6, 2024 – December 22, 2024" },
            { title: "Good Bad People", dates: "January 24, 2025 – February 8, 2025" }
        ];

        const tbody = document.getElementById('portal-body');
        shows.forEach(show => {
            tbody.innerHTML += `<tr>
                <td>${show.title}</td>
                <td>${show.dates}</td>
                <td><a href="#" class="btn">Schedule</a></td>
                <td><a href="#" class="btn">Contact</a></td>
                <td><a href="mailto:?subject=Regarding ${show.title}" class="btn">Message</a></td>
            </tr>`;
        });
    </script>
</body>
</html>
