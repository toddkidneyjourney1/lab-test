
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast & Crew Portal | The Laboratory Theater of Florida</title>
    <link rel="stylesheet" href="style.css">
    <!-- Clerk SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" async></script>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="button">Home</a>
            <a href="company.html" class="button">Company Hub</a>
        </nav>
        <h1>Cast & Crew Portal</h1>
        <p>Secure access for current company members.</p>
        <!-- Clerk Authentication Button -->
        <div id="clerk-auth"></div>
    </header>

    <main id="portal-content">
        <!-- Production Cards -->
        <section id="productions">
            <h2>Current Productions</h2>
            <div class="production-grid">
                <!-- Production cards here as defined previously -->
            </div>
        </section>

        <!-- Secure Resources Section (Hidden until authenticated) -->
        <section id="resources" style="display:none;">
            <h2>Company Resources</h2>
            <ul>
                <li><a href="#">Conflict Calendar</a></li>
                <li><a href="#">Contact Sheet</a></li>
                <li><a href="#">Company Handbook</a></li>
            </ul>
        </section>
    </main>

    <!-- Authentication Script -->
    <script>
        window.addEventListener('load', async () => {
            const Clerk = window.Clerk;
            await Clerk.load();

            if (Clerk.user) {
                // User is logged in, show protected content
                document.getElementById('resources').style.display = 'block';
                document.getElementById('clerk-auth').innerHTML = '<div id="user-button"></div>';
                Clerk.mountUserButton(document.getElementById('user-button'));
                
                // Initialize Supabase with Clerk token
                // const supabase = createSupabaseClient(Clerk); 
            } else {
                // User is not logged in, show login button
                document.getElementById('clerk-auth').innerHTML = '<div id="sign-in"></div>';
                Clerk.mountSignIn(document.getElementById('sign-in'));
            }
        });
    </script>
</body>
</html>
