<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Portal</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:#0f0f10; color:#f1f1f1; }
    .wrap { max-width:1100px; margin:0 auto; padding:18px; }
    .panel { background:#181818; border:1px solid #333; border-radius:12px; padding:14px; margin-bottom:12px; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .btn { border:0; border-radius:8px; padding:8px 12px; background:#d72638; color:#fff; font-weight:700; cursor:pointer; }
    .btn.gray { background:#444; }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:900px){ .grid{ grid-template-columns:1fr; } }
    .hidden { display:none !important; }
    .muted { color:#bdbdbd; font-size:12px; }
    .ok { color:#9fe0b0; }
    .err { color:#efb0b0; }
    input, textarea { width:100%; padding:8px; border:1px solid #444; border-radius:8px; background:#101010; color:#fff; }
    textarea { min-height:90px; resize:vertical; }
    .list { border:1px solid #333; border-radius:8px; background:#131313; padding:10px; }
    .ticker { font-weight:700; color:#fff; padding:10px; border:1px solid #333; border-radius:8px; background:#121212; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1 style="margin:0 0 10px;">Cast Portal</h1>
      <div class="row">
        <button id="login-btn" class="btn" type="button">Login</button>
        <button id="logout-btn" class="btn gray hidden" type="button">Logout</button>
        <span id="auth-status" class="muted">Not signed in</span>
      </div>
      <div id="msg" class="muted" style="margin-top:8px;">Ready.</div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0;">Shows Ticker</h3>
      <div id="public-ticker" class="ticker">Loading ticker...</div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0;">Cast List</h3>
      <div id="public-cast-list" class="list muted">Loading cast list...</div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0;">Performance Calendar</h3>
      <div id="public-calendar-list" class="list muted">Loading calendar...</div>
    </div>

    <!-- ADMIN ONLY -->
    <div id="admin-root" class="hidden">
      <div class="grid">
        <div class="panel">
          <h3 style="margin-top:0;">Edit Shows Ticker (Admin)</h3>
          <textarea id="ticker-input" placeholder="Ticker text..."></textarea>
          <div class="row" style="margin-top:8px;">
            <button id="save-ticker-btn" class="btn" type="button">Save Ticker</button>
          </div>
        </div>

        <div class="panel">
          <h3 style="margin-top:0;">Edit Cast List (Admin)</h3>
          <textarea id="cast-input" placeholder="One role per line"></textarea>
          <div class="row" style="margin-top:8px;">
            <button id="save-cast-btn" class="btn" type="button">Save Cast List</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <h3 style="margin-top:0;">Edit Calendar (Admin)</h3>
        <div class="grid">
          <div>
            <label class="muted" for="show-name">Show</label>
            <input id="show-name" placeholder="Show title" />
          </div>
          <div>
            <label class="muted" for="show-date">Date</label>
            <input id="show-date" type="date" />
          </div>
          <div>
            <label class="muted" for="show-time">Time</label>
            <input id="show-time" placeholder="7:30 PM" />
          </div>
          <div>
            <label class="muted" for="show-tz">TZ</label>
            <input id="show-tz" placeholder="EDT" />
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <button id="save-calendar-btn" class="btn" type="button">Add / Update</button>
          <button id="delete-calendar-btn" class="btn gray" type="button">Delete (date+time)</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://izytzrxrgnahyvgwqhgd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_xfsIVVSH8vcUz9XfZgirwA_wl-GSYOw";

    const ADMIN_EMAILS = ["mrtoddlyman@gmail.com"];

    const SETTINGS_TABLE = "portal_settings";
    const CALENDAR_TABLE = "cast_calendar";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const authStatus = document.getElementById("auth-status");
    const msgEl = document.getElementById("msg");
    const adminRoot = document.getElementById("admin-root");

    const publicTicker = document.getElementById("public-ticker");
    const publicCastList = document.getElementById("public-cast-list");
    const publicCalendarList = document.getElementById("public-calendar-list");

    const tickerInput = document.getElementById("ticker-input");
    const castInput = document.getElementById("cast-input");

    const showName = document.getElementById("show-name");
    const showDate = document.getElementById("show-date");
    const showTime = document.getElementById("show-time");
    const showTz = document.getElementById("show-tz");

    let currentUser = null;
    let isAdmin = false;

    function setMsg(text, ok = true) {
      msgEl.className = ok ? "muted ok" : "muted err";
      msgEl.textContent = text;
    }

    function updateAuthUI() {
      if (!currentUser) {
        authStatus.textContent = "Not signed in";
        loginBtn.classList.remove("hidden");
        logoutBtn.classList.add("hidden");
        adminRoot.classList.add("hidden");
        return;
      }

      authStatus.textContent = `Signed in: ${currentUser.email}`;
      loginBtn.classList.add("hidden");
      logoutBtn.classList.remove("hidden");

      if (isAdmin) adminRoot.classList.remove("hidden");
      else adminRoot.classList.add("hidden");
    }

    async function refreshAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      currentUser = session?.user || null;
      isAdmin = !!(currentUser?.email && ADMIN_EMAILS.includes(currentUser.email.toLowerCase()));
      updateAuthUI();
    }

    function requireAdmin() {
      if (!currentUser || !isAdmin) {
        setMsg("Admin only.", false);
        return false;
      }
      return true;
    }

    async function login() {
      const email = prompt("Admin email:");
      if (!email) return;
      const password = prompt("Password:");
      if (!password) return;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return setMsg("Login failed: " + error.message, false);

      setMsg("Login successful.");
      await refreshAuth();
      await loadAll();
    }

    async function logout() {
      const { error } = await supabase.auth.signOut();
      if (error) return setMsg("Logout failed: " + error.message, false);

      currentUser = null;
      isAdmin = false;
      updateAuthUI();
      setMsg("Logged out.");
    }

    async function loadSettings() {
      const { data, error } = await supabase
        .from(SETTINGS_TABLE)
        .select("key, value")
        .in("key", ["shows_ticker", "cast_list"]);

      if (error) {
        setMsg("Settings load failed: " + error.message, false);
        return;
      }

      const map = Object.fromEntries((data || []).map(r => [r.key, r.value || ""]));
      const ticker = map.shows_ticker || "No ticker text set.";
      const cast = map.cast_list || "No cast list set.";

      publicTicker.textContent = ticker;
      publicCastList.innerHTML = cast
        .split("\n")
        .filter(Boolean)
        .map(line => `<div>${line}</div>`)
        .join("") || "<div>No cast list set.</div>";

      if (isAdmin) {
        tickerInput.value = map.shows_ticker || "";
        castInput.value = map.cast_list || "";
      }
    }

    async function loadCalendar() {
      const { data, error } = await supabase
        .from(CALENDAR_TABLE)
        .select("show, date, time, tz")
        .order("date", { ascending: true });

      if (error) {
        setMsg("Calendar load failed: " + error.message, false);
        publicCalendarList.textContent = "Failed to load.";
        return;
      }

      if (!data || !data.length) {
        publicCalendarList.textContent = "No calendar entries.";
        return;
      }

      publicCalendarList.innerHTML = data.map(r =>
        `<div>${r.date} • ${r.time} (${r.tz}) — <strong>${r.show}</strong></div>`
      ).join("");
    }

    async function saveSetting(key, value) {
      if (!requireAdmin()) return;

      const { error } = await supabase
        .from(SETTINGS_TABLE)
        .upsert([{ key, value }], { onConflict: "key" });

      if (error) return setMsg(`Save failed (${key}): ` + error.message, false);
      setMsg(`Saved ${key}.`);
      await loadSettings();
    }

    async function saveCalendarEntry() {
      if (!requireAdmin()) return;

      const payload = {
        show: (showName.value || "").trim(),
        date: (showDate.value || "").trim(),
        time: (showTime.value || "").trim(),
        tz: (showTz.value || "").trim()
      };
      if (!payload.show || !payload.date || !payload.time || !payload.tz) {
        return setMsg("Fill show/date/time/tz.", false);
      }

      const { error } = await supabase
        .from(CALENDAR_TABLE)
        .upsert([payload], { onConflict: "date,time" });

      if (error) return setMsg("Calendar save failed: " + error.message, false);

      setMsg("Calendar saved.");
      await loadCalendar();
    }

    async function deleteCalendarEntry() {
      if (!requireAdmin()) return;

      const date = (showDate.value || "").trim();
      const time = (showTime.value || "").trim();
      if (!date || !time) return setMsg("Provide date+time to delete.", false);

      const { error } = await supabase
        .from(CALENDAR_TABLE)
        .delete()
        .eq("date", date)
        .eq("time", time);

      if (error) return setMsg("Calendar delete failed: " + error.message, false);

      setMsg("Calendar entry deleted.");
      await loadCalendar();
    }

    async function loadAll() {
      await Promise.all([loadSettings(), loadCalendar()]);
    }

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);

    document.getElementById("save-ticker-btn").addEventListener("click", () => saveSetting("shows_ticker", tickerInput.value));
    document.getElementById("save-cast-btn").addEventListener("click", () => saveSetting("cast_list", castInput.value));
    document.getElementById("save-calendar-btn").addEventListener("click", saveCalendarEntry);
    document.getElementById("delete-calendar-btn").addEventListener("click", deleteCalendarEntry);

    supabase.auth.onAuthStateChange(async () => {
      await refreshAuth();
      await loadAll();
    });

    (async function init(){
      await refreshAuth();
      await loadAll();
      setMsg("Cast portal loaded.");
    })();
  </script>
</body>
</html>
