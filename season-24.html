
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Gallery | The Laboratory Theater of Florida</title>
    <style>
        /* Base Styles */
        body { margin: 0; font-family: sans-serif; background-color: #1a1a1a; color: #fff; }

        /* Left-aligned Header */
        .main-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 1rem 2rem;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        .logo { font-size: 1.5rem; font-weight: bold; margin-right: auto; }
        .logo a { color: #fff; text-decoration: none; }
        .logo span { color: #ff3366; }

        /* Masonry-style Grid for variable sizes */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-auto-rows: 250px;
            grid-auto-flow: dense;
            gap: 15px;
            padding: 20px;
        }
        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        .photo-item:hover { transform: scale(1.02); }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Variable sizes */
        .wide { grid-column: span 2; }
        .tall { grid-row: span 2; }

        /* Hamburger Nav (Simplified) */
        .nav-toggle-label { cursor: pointer; color: #ff3366; font-size: 1.5rem; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <a href="index.html"><span>THE</span> LAB</a>
        </div>
        <label class="nav-toggle-label">☰</label>
    </header>

    <main>
        <div class="photo-gallery">
            <div class="photo-item wide"><img src="assets/lab(1).png" alt="Alien Production 1"></div>
            <div class="photo-item"><img src="assets/lab(2).png" alt="Alien Production 2"></div>
            <div class="photo-item tall"><img src="assets/lab(3).png." alt="Alien Production 3"></div>
            <div class="photo-item"><img src="assets/lab(4).png" alt="Alien Production 4"></div>
           <div class="photo-item wide"><img src="assets/lab(5).png" alt="Alien Production 1"></div>
            <div class="photo-item"><img src="assets/lab(6).png" alt="Alien Production 2"></div>
            <div class="photo-item tall"><img src="assets/lab(7).png." alt="Alien Production 3"></div>
            <div class="photo-item"><img src="assets/lab(8).png" alt="Alien Production 4"></div>
           <div class="photo-item wide"><img src="assets/lab(9).png" alt="Alien Production 1"></div>
            <div class="photo-item"><img src="assets/lab(12).png" alt="Alien Production 2"></div>
            <div class="photo-item tall"><img src="assets/lab(13).png." alt="Alien Production 3"></div>
            <div class="photo-item"><img src="assets/lab(10).png" alt="Alien Production 4"></div>
        </div>
    </main>

</body>
</html>
