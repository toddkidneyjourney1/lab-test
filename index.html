<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Laboratory Theater of Florida | Thinking Theater</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #f4f4f7;
            --accent-glow: #ff3366;
            --accent-muted: #8a2be2;
            --card-bg: rgba(25, 25, 30, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
        }

        header {
            padding: 1.5rem 2rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: rgba(10, 10, 12, 0.95);
            z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; }
        .logo span { color: var(--accent-glow); }
        .hamburger { cursor: pointer; font-size: 1.5rem; justify-self: end; }

        main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .hero { text-align: center; margin-bottom: 4rem; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        
        .shows-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 2rem; 
        }
        .show-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 1.5rem; 
            display: flex; 
            flex-direction: column;
        }
        .show-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 4px; 
            margin-bottom: 1rem; 
        }
        .ticket-btn { 
            display: block; 
            text-align: center; 
            padding: 0.8rem; 
            margin-top: auto; 
            background: var(--accent-glow); 
            color: white; 
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">The <span>Lab</span></div>
        <div class="center-nav"></div>
        <div class="hamburger">☰</div>
    </header>

    <main>
        <section class="hero">
            <h1>Next Production: Waiting for Godot</h1>
            <p>August 21 – Sept. 6</p>
        </section>

        <div class="shows-grid">
            <div class="show-card">
                <img src="assets/godot.jpg" alt="Waiting for Godot">
                <h3>Waiting for Godot</h3>
                <a href="production/godot.html" class="ticket-btn" target="_blank">Get Tickets</a>
            </div>
            
            <div class="show-card">
                <img src="assets/pillowman.jpg" alt="The Pillowman">
                <h3>The Pillowman</h3>
                <a href="production/pillowman.html" class="ticket-btn" target="_blank">Get Tickets</a>
            </div>

            <div class="show-card">
                <img src="assets/rivals.jpg" alt="The Rivals">
                <h3>The Rivals</h3>
                <a href="production/rivals.html" class="ticket-btn" target="_blank">Get Tickets</a>
            </div>

            <div class="show-card">
                <img src="assets/godofcarnage.jpg" alt="God of Carnage">
                <h3>God of Carnage</h3>
                <a href="production/god.html" class="ticket-btn" target="_blank">Get Tickets</a>
            </div>

            <div class="show-card">
                <img src="assets/bare.jpg" alt="Bare: A Pop Opera">
                <h3>Bare: A Pop Opera</h3>
                <a href="production/bare.html" class="ticket-btn" target="_blank">Get Tickets</a>
            </div>

            <div class="show-card">
                <img src="assets/fences.jpg" alt="Fences">
                <h3>Fences</h3>
                <a href="production/fences.html" class="ticket-btn" target="_blank">Get Tickets</a>
            </div>
        </div>
    </main>

    <footer>
        <p style="text-align: center; padding: 2rem;">&copy; 2026 The Laboratory Theater of Florida</p>
    </footer>

</body>
</html>
