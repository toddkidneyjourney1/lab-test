<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>The Laboratory Theater of Florida | The Experimentation Board</title>
</head>
<body>

    <header>
        <h1>THE LAB THEATER</h1>
        <p>THINKING THEATER</p>
    </header>

    <main>
        <section class="experimentation-board">
            <h2>The Experimentation Board</h2>
            
            <div class="card-grid">
                <!-- Production Cards -->
                <div class="card">
                    <img src="assets/godot.jpg" alt="Waiting for Godot">
                    <h3>Waiting for Godot</h3>
                    <p>Aug 21 – Sept 6</p>
                </div>

                <div class="card">
                    <img src="assets/pillowman.jpg" alt="The Pillowman">
                    <h3>The Pillowman</h3>
                    <p>Oct 8 – 25</p>
                </div>

                <div class="card">
                    <img src="assets/rivals.jpg" alt="The Rivals">
                    <h3>The Rivals</h3>
                    <p>Nov 12 – 29</p>
                </div>

                <div class="card">
                    <img src="assets/carnage.jpg" alt="God of Carnage">
                    <h3>God of Carnage</h3>
                    <p>Jan 14 – 31</p>
                </div>

                <div class="card">
                    <img src="assets/bare.jpg" alt="Bare the Musical">
                    <h3>Bare the Musical</h3>
                    <p>Feb 18 – Mar 7</p>
                </div>

                <div class="card">
                    <img src="assets/midsummer.jpg" alt="A Midsummer Night's Dream">
                    <h3>A Midsummer Night's Dream</h3>
                    <p>Mar 25 – Apr 11</p>
                </div>

                <div class="card">
                    <img src="assets/fences.jpg" alt="Fences">
                    <h3>Fences</h3>
                    <p>Apr 22 – May 9</p>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
