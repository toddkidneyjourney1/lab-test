<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Sci-Fi CTA</title>
  <style>
    body {
      margin: 0;
      min-height: 200vh; /* demo scroll */
      background: #0a0f14; /* dark theme */
      color: #e6f7ff;
      font-family: Arial, sans-serif;
    }

    .sticky-cta {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 9999;

      display: inline-block;
      padding: 0.85rem 1.1rem;
      border-radius: 10px;
      border: 1px solid #63f5ff;
      background: linear-gradient(135deg, #042029 0%, #063847 100%);
      color: #eaffff;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.02em;

      box-shadow:
        0 0 10px rgba(74, 238, 255, 0.45),
        0 0 20px rgba(74, 238, 255, 0.25),
        inset 0 0 10px rgba(74, 238, 255, 0.12);
      animation: holoPulse 2.2s ease-in-out infinite;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .sticky-cta:hover,
    .sticky-cta:focus-visible {
      transform: scale(1.05);
      background: linear-gradient(135deg, #063241 0%, #0a4f64 100%);
      box-shadow:
        0 0 14px rgba(74, 238, 255, 0.75),
        0 0 30px rgba(74, 238, 255, 0.5),
        inset 0 0 12px rgba(74, 238, 255, 0.2);
      outline: none;
    }

    @keyframes holoPulse {
      0%, 100% {
        box-shadow:
          0 0 10px rgba(74, 238, 255, 0.45),
          0 0 20px rgba(74, 238, 255, 0.25),
          inset 0 0 10px rgba(74, 238, 255, 0.12);
      }
      50% {
        box-shadow:
          0 0 12px rgba(74, 238, 255, 0.6),
          0 0 24px rgba(74, 238, 255, 0.35),
          inset 0 0 11px rgba(74, 238, 255, 0.16);
      }
    }
  </style>
</head>
<body>
  <a href="#" class="sticky-cta">Initialize Protocol</a>
</body>
</html>
