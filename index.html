<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Laboratory Theater of Florida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Updated Hamburger Menu -->
    <nav class="mobile-nav">
        <button id="menu-toggle" aria-label="Toggle Menu">Menu</button>
        <ul id="menu-list" class="hidden">
            <li><a href="/">Home</a></li>
            <li><a href="/box-office">Box Office</a></li>
            
            <!-- New "Plan Your Visit" Accordion -->
            <li>
                <details>
                    <summary>Plan Your Visit</summary>
                    <ul>
                        <li><a href="/directions">Directions</a></li>
                        <li><a href="/parking">Parking</a></li>
                        <li><a href="/local-eateries">Local Eateries</a></li>
                    </ul>
                </details>
            </li>

            <li><a href="/classes">Classes</a></li>
            <li><a href="/special-events" class="special-event-link">Special Events</a></li>
            <li><a href="/support">Support Us</a></li>
        </ul>
    </nav>

    <!-- Header and Main Content -->
    <header>
        <div class="logo">
            THE <span>LAB</span>
            <p class="tagline">Intentionally innovative live theater</p>
        </div>
    </header>

    <main>
        <!-- Your existing content goes here -->
    </main>

    <!-- Script to toggle the menu -->
    <script>
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('menu-list');

        toggle.addEventListener('click', () => {
            menu.classList.toggle('open');
        });

        // Close menu when a link is clicked
        menu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                menu.classList.remove('open');
            });
        });
    </script>
</body>
</html>
