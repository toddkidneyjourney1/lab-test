<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Laboratory Theater of Florida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">THE <span>LAB</span></div>
        <nav class="nav-links">
            <a href="#">Box Office</a>
            <a href="#">Support Us</a>
        </nav>
    </header>

    <main>
        <!-- Featured Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <span class="tag">Next Production</span>
                <h1>Waiting for Godot</h1>
                <p>On a barren road, two men wait for a mysterious figure who never arrives.</p>
                <a href="https://www.purplepass.com/waiting" class="btn-primary">Secure Your Seat</a>
            </div>
            <img src="assets/godot.jpg" alt="Waiting for Godot">
        </section>

        <!-- Season Lineup -->
        <section class="shows-list">
            <h2>Season Lineup</h2>
            <div class="show-item">
                <img src="assets/godot.jpg" alt="Show">
                <div class="show-details">
                    <h3>Waiting for Godot</h3>
                    <p>Aug 21 – Sept 6</p>
                </div>
                <a href="https://www.purplepass.com/waiting" class="btn-secondary">Tickets</a>
            </div>
            <!-- Repeat for other shows -->
        </section>
    </main>
</body>
</html>
