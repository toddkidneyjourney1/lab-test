<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pillowman | The Lab Theater</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Container for the bottom links to align them opposite each other */
        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .btn-primary {
            display: inline-block;
            padding: 10px 20px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        /* Style the back link to look like a button */
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background-color: #ccc;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">THE <span>LAB</span>
            <p class="tagline">Intentionally innovative live theater</p>
        </div>
    </header>

    <main>
        <article class="production-details">
            <h1>The Pillowman</h1>
            <p class="meta">October 8 – 25, 2026</p>
            <img src="../assets/pillowman.jpg" alt="The Pillowman" class="feature-img">
            <div class="content">
                <p>by Martin McDonagh</p>
                <p>An intense psychological journey exploring the storytelling instinct as a fundamental—and sometimes dangerous—human necessity.</p>
            </div>
            
            <div class="bottom-nav">
                <a href="https://www.purplepass.com/events/376583-the-pillowman-oct-8th-2026" class="btn-primary">
                    Hold on to your seat
                </a>
                <a href="../index.html" class="btn-back">
                    Back to The Lab
                </a>
            </div>
        </article>
    </main>
</body>
</html>
