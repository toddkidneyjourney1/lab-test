<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production | The Lab Theater</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stage-glow"></div>
    <header>
        <div class="logo">The <span>Lab</span> Theater</div>
        <div class="tagline">Thinking Theater</div>
    </header>

    <main>
        <section class="featured-production">
            <div class="featured-card">
                <!-- Replace 'your-image.jpg' with the actual image path -->
                <img src="assets/your-image.jpg" alt="Production Image" class="featured-image">
                
                <div class="featured-content">
                    <h2>Production Title</h2>
                    <p class="featured-desc">Add your production description here. This section is centered to match your design.</p>
                    
                    <div class="featured-meta">
                        <p><strong>Dates:</strong> Month Day – Day</p>
                        <a href="#" class="ticket-btn">Get Tickets</a>
                        <a href="../index.html" class="back-btn">← Back to Experimentation Board</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 The Laboratory Theater of Florida</p>
    </footer>

</html>
