<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Calendar</title>
  <style>
    body { background:#0f0f0f; color:#f3f3f3; font-family:Arial,sans-serif; margin:0; }
    .wrap { max-width:1100px; margin:0 auto; padding:20px; }
    .card { background:#171717; border:1px solid #303030; border-radius:12px; padding:14px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .btn { border:0; border-radius:8px; padding:8px 12px; background:#d72638; color:#fff; cursor:pointer; font-weight:700; }
    .btn.gray { background:#444; }
    .grid-wrap { display:grid; grid-template-columns:1.3fr .9fr; gap:12px; margin-top:12px; }
    .dow, #calendar-grid { display:grid; grid-template-columns:repeat(7, minmax(0,1fr)); gap:6px; }
    .dow div { text-align:center; color:#aaa; font-size:12px; }
    #calendar-grid { min-height:420px; }
    .day { border:1px solid #353535; background:#121212; border-radius:10px; min-height:86px; padding:6px; }
    .outside { opacity:.35; }
    .has-show.open { box-shadow: inset 0 0 0 1px rgba(56,171,87,.45); }
    .has-show.full { box-shadow: inset 0 0 0 1px rgba(160,55,55,.45); }
    .selected { outline:2px solid #d72638; }
    .day-btn { width:100%; border:0; background:transparent; color:inherit; text-align:left; cursor:pointer; padding:0; }
    .num { font-size:12px; color:#bbb; }
    .pill { display:inline-block; margin-top:4px; font-size:11px; border-radius:999px; padding:2px 7px; border:1px solid #3f3f3f; }
    .pill.open { border-color:#2f8a49; color:#a7e9b6; }
    .pill.full { border-color:#8a3434; color:#f3b7b7; }
    .show-mini { margin-top:5px; font-size:11px; color:#d0d0d0; line-height:1.2; max-height:2.4em; overflow:hidden; }
    .detail h3 { margin:0 0 8px; }
    .empty { border:1px dashed #484848; border-radius:10px; padding:10px; color:#c8c8c8; background:#131313; }
    @media (max-width:900px){ .grid-wrap{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 style="margin:0 0 8px;">Volunteer Calendar</h1>
      <div class="row">
        <button id="prev-month-btn" class="btn gray">Prev</button>
        <button id="today-month-btn" class="btn gray">This Month</button>
        <button id="next-month-btn" class="btn gray">Next</button>
        <strong id="month-title">Month</strong>
      </div>
      <div id="msg" style="margin-top:8px;color:#bdbdbd;"></div>
    </div>

    <div class="grid-wrap">
      <div class="card">
        <div class="dow">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div id="calendar-grid"></div>
      </div>

      <div class="card detail">
        <h3 id="detail-title">Select a performance date</h3>
        <div id="detail-body" class="empty">Click a highlighted date in the calendar.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ====== CONFIG ======
    const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const TABLE_NAME = "volunteer_shifts";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Minimal schedule sample (replace with your full 83 if desired)
    const MASTER_PERFORMANCES = [
      { show:"Waiting for Godot", date:"2026-08-20", time:"7:30 PM", tz:"EDT" },
      { show:"Waiting for Godot", date:"2026-08-21", time:"7:30 PM", tz:"EDT" },
      { show:"Waiting for Godot", date:"2026-08-22", time:"7:30 PM", tz:"EDT" },
      { show:"Waiting for Godot", date:"2026-08-23", time:"2:00 PM", tz:"EDT" }
    ];

    const SHIFT_TEMPLATE = { box_office:1, concessions:1, usher:2 };
    const PERFORMANCE_DATES = MASTER_PERFORMANCES.map(p => `${p.date} ${p.time}`);
    const LOOKUP = Object.fromEntries(MASTER_PERFORMANCES.map(p => [p.date, p]));

    const monthTitleEl = document.getElementById("month-title");
    const calendarGridEl = document.getElementById("calendar-grid");
    const detailTitleEl = document.getElementById("detail-title");
    const detailBodyEl = document.getElementById("detail-body");
    const msgEl = document.getElementById("msg");

    let visibleMonth = new Date("2026-08-01T00:00:00");
    let selectedDateKey = null;
    let schedule = defaultSchedule();

    function defaultSchedule(){
      const o = {};
      for(const p of MASTER_PERFORMANCES){
        o[p.date] = {
          display: `${p.date} ${p.time}`,
          show: p.show,
          box_office:[null],
          concessions:[null],
          usher:[null,null]
        };
      }
      return o;
    }

    function countOpen(dateKey){
      const d = schedule[dateKey]; if(!d) return 0;
      return [...d.box_office, ...d.concessions, ...d.usher].filter(v => !v).length;
    }

    function renderCalendar(){
      const y = visibleMonth.getFullYear(), m = visibleMonth.getMonth();
      const first = new Date(y,m,1), last = new Date(y,m+1,0);
      monthTitleEl.textContent = first.toLocaleString(undefined, {month:'long', year:'numeric'});

      const start = first.getDay();
      const daysInMonth = last.getDate();
      const prevLast = new Date(y,m,0).getDate();

      const cells = [];
      for(let i=0;i<start;i++) cells.push({d:new Date(y,m-1,prevLast-start+i+1), outside:true});
      for(let d=1;d<=daysInMonth;d++) cells.push({d:new Date(y,m,d), outside:false});
      while(cells.length % 7 !== 0) cells.push({d:new Date(y,m+1,cells.length-(start+daysInMonth)+1), outside:true});

      calendarGridEl.innerHTML = "";
      for(const c of cells){
        const d = c.d;
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const perf = schedule[key];
        const isPerf = !!perf;
        const open = isPerf ? countOpen(key) : 0;
        const full = isPerf && open===0;

        const day = document.createElement("div");
        day.className = "day" + (c.outside ? " outside":"") + (isPerf ? " has-show":"") + (isPerf && open>0 ? " open":"") + (full ? " full":"") + (selectedDateKey===key ? " selected":"");

        const btn = document.createElement("button");
        btn.className = "day-btn";
        btn.type = "button";
        btn.disabled = !isPerf;
        btn.innerHTML = `<span class="num">${d.getDate()}</span>`;

        if(isPerf){
          const pill = document.createElement("span");
          pill.className = "pill " + (open>0 ? "open":"full");
          pill.textContent = open>0 ? `${open} open` : "Full";
          btn.appendChild(pill);

          const mini = document.createElement("div");
          mini.className = "show-mini";
          mini.textContent = perf.show;
          btn.appendChild(mini);

          btn.onclick = () => {
            selectedDateKey = key;
            renderCalendar();
            renderDetail();
          };
        }

        day.appendChild(btn);
        calendarGridEl.appendChild(day);
      }
    }

    function renderDetail(){
      if(!selectedDateKey || !schedule[selectedDateKey]){
        detailTitleEl.textContent = "Select a performance date";
        detailBodyEl.className = "empty";
        detailBodyEl.textContent = "Click a highlighted date in the calendar.";
        return;
      }
      const s = schedule[selectedDateKey];
      detailTitleEl.textContent = s.display;
      detailBodyEl.className = "empty";
      detailBodyEl.innerHTML = `<strong>${s.show}</strong><br>${countOpen(selectedDateKey)} open slots`;
    }

    async function loadFromSupabase(){
      try{
        msgEl.textContent = "Loading...";
        const { data, error } = await supabase
          .from(TABLE_NAME)
          .select("performance_date, role, slot_index, assigned_to")
          .in("performance_date", PERFORMANCE_DATES);

        if(error) throw error;

        schedule = defaultSchedule();
        for(const r of (data || [])){
          const key = (r.performance_date || "").split(" ")[0];
          if(!schedule[key] || !schedule[key][r.role]) continue;
          if(r.slot_index < 0 || r.slot_index >= schedule[key][r.role].length) continue;
          schedule[key][r.role][r.slot_index] = r.assigned_to ?? null;
        }

        msgEl.textContent = `Loaded ${data?.length || 0} rows`;
        renderCalendar();
        renderDetail();
      }catch(e){
        console.error(e);
        msgEl.textContent = "Supabase load failed. Showing local calendar only.";
        renderCalendar();
        renderDetail();
      }
    }

    document.getElementById("prev-month-btn").onclick = () => {
      visibleMonth = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth()-1, 1);
      renderCalendar();
    };
    document.getElementById("next-month-btn").onclick = () => {
      visibleMonth = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth()+1, 1);
      renderCalendar();
    };
    document.getElementById("today-month-btn").onclick = () => {
      const t = new Date();
      visibleMonth = new Date(t.getFullYear(), t.getMonth(), 1);
      renderCalendar();
    };

    // guaranteed first paint
    renderCalendar();
    renderDetail();
    loadFromSupabase();
  </script>
</body>
</html>
