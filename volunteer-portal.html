<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Portal | The Laboratory Theater of Florida</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .shift-card {
      background: var(--card-bg);
      padding: 1.25rem;
      border-radius: 8px;
      border: 1px solid #333;
      margin-bottom: 1rem;
    }
    .shift-card h3 { margin-top: 0; color: var(--accent); }
    .shift-meta { margin: 0.5rem 0 0.75rem; font-size: 0.95rem; color: #ddd; }
    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .status-open { background: #2b9a4a; color: #fff; }
    .status-full { background: #a33131; color: #fff; }
    .status-signed { background: var(--accent); color: #fff; }
    .shift-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .btn {
      flex: 1;
      padding: 0.7rem 0.9rem;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #666; color: #fff; }
    .btn:disabled { background: #555; cursor: not-allowed; opacity: 0.8; }
    .notice { padding: 0.8rem 1rem; border-radius: 6px; margin: 0.75rem 0; font-weight: 600; }
    .notice.success { background: #2b9a4a; color: #fff; }
    .notice.error { background: #a33131; color: #fff; }
    .loading { text-align: center; padding: 1.5rem; color: #ddd; }
  </style>
</head>
<body>
  <input type="checkbox" id="nav-toggle" class="nav-toggle" />
  <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
  <nav class="hamburger-menu">
    <a href="about.html">Origin Story</a>
    <a href="archive25.html">Past Experiments</a>
    <a href="index.html">Back to the Slab</a>
    <a href="plan.html">Lab Protocols</a>
    <a href="portal-landing.html">Portal Landing</a>
    <a href="support.html">Fuel the Innovation</a>
    <a href="sponsors.html">Core Collaborators</a>
  </nav>

  <header>
    <div class="logo">THE <span>LAB</span><p class="tagline">Intentionally innovative live theater</p></div>
  </header>

  <main id="portal-content">
    <h1>Volunteer Portal</h1>
    <p>Sign up for volunteer shifts by date and role.</p>
    <div id="message-container"></div>
    <section id="shifts">
      <h2>Available Shifts</h2>
      <div id="shift-container" class="production-grid"><p class="loading">Loading shifts...</p></div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Replace with your real project values
    const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const SHIFT_SCHEDULE = [
      { id: "s1", date: "DATE_PLACEHOLDER_1", type: "Ushering", spots: 4 },
      { id: "s2", date: "DATE_PLACEHOLDER_2", type: "Concessions", spots: 3 },
      { id: "s3", date: "DATE_PLACEHOLDER_3", type: "Box Office", spots: 2 },
      { id: "s4", date: "DATE_PLACEHOLDER_4", type: "Behind the Scenes", spots: 5 },
      { id: "s5", date: "DATE_PLACEHOLDER_5", type: "Ushering", spots: 4 },
      { id: "s6", date: "DATE_PLACEHOLDER_6", type: "Concessions", spots: 3 },
      { id: "s7", date: "DATE_PLACEHOLDER_7", type: "Box Office", spots: 2 },
      { id: "s8", date: "DATE_PLACEHOLDER_8", type: "Behind the Scenes", spots: 5 }
    ];

    const STORAGE_KEY = "labVolunteerPortalSignups";
    let currentUser = null;

    function showMessage(text, type) {
      const container = document.getElementById("message-container");
      container.innerHTML = `<div class="notice ${type}">${text}</div>`;
      setTimeout(() => { container.innerHTML = ""; }, 3500);
    }

    function getSignups() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; }
    }

    function saveSignups(signups) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(signups));
    }

    function getCurrentUserKey() {
      return currentUser?.id || "anonymous";
    }

    async function requireVolunteerAccess() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user) {
        window.location.href = "portal-landing.html";
        return false;
      }

      currentUser = session.user;

      const { data: profile, error } = await supabase
        .from("profiles")
        .select("is_volunteer")
        .eq("id", currentUser.id)
        .single();

      if (error || !profile?.is_volunteer) {
        showMessage("Access denied. Volunteer authorization required.", "error");
        setTimeout(() => {
          window.location.href = "portal-landing.html";
        }, 1200);
        return false;
      }

      return true;
    }

    function renderShifts() {
      const container = document.getElementById("shift-container");
      const signups = getSignups();
      const currentUserKey = getCurrentUserKey();

      container.innerHTML = SHIFT_SCHEDULE.map((shift) => {
        const signedUsers = signups[shift.id] || [];
        const isSignedUp = signedUsers.includes(currentUserKey);
        const remaining = Math.max(0, shift.spots - signedUsers.length);
        const isFull = remaining === 0;

        let statusClass = "status-open";
        let statusLabel = `Open (${remaining} spot${remaining === 1 ? "" : "s"} left)`;

        if (isSignedUp) {
          statusClass = "status-signed";
          statusLabel = "You are signed up";
        } else if (isFull) {
          statusClass = "status-full";
          statusLabel = "Shift Full";
        }

        return `
          <article class="shift-card">
            <h3>${shift.type}</h3>
            <p class="shift-meta"><strong>Date:</strong> ${shift.date}</p>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
            <div class="shift-actions">
              ${isSignedUp
                ? `<button class="btn btn-secondary" onclick="cancelShift('${shift.id}')">Cancel</button>`
                : `<button class="btn btn-primary" onclick="signupForShift('${shift.id}')" ${isFull ? "disabled" : ""}>Sign Up</button>`}
            </div>
          </article>`;
      }).join("");
    }

    window.signupForShift = function signupForShift(shiftId) {
      const userKey = getCurrentUserKey();
      if (!userKey || userKey === "anonymous") {
        return showMessage("No active session found. Please return to Portal Landing.", "error");
      }

      const signups = getSignups();
      const shift = SHIFT_SCHEDULE.find((s) => s.id === shiftId);
      if (!shift) return;

      const signedUsers = signups[shiftId] || [];
      if (signedUsers.includes(userKey)) return showMessage("You are already signed up for this shift.", "error");
      if (signedUsers.length >= shift.spots) return showMessage("This shift is already full.", "error");

      signups[shiftId] = [...signedUsers, userKey];
      saveSignups(signups);
      showMessage("Signup successful!", "success");
      renderShifts();
    };

    window.cancelShift = function cancelShift(shiftId) {
      const userKey = getCurrentUserKey();
      const signups = getSignups();
      const signedUsers = signups[shiftId] || [];
      signups[shiftId] = signedUsers.filter((id) => id !== userKey);
      saveSignups(signups);
      showMessage("Signup canceled.", "success");
      renderShifts();
    };

    window.addEventListener("load", async () => {
      const allowed = await requireVolunteerAccess();
      if (!allowed) return;
      renderShifts();
    });
  </script>
</body>
</html>
