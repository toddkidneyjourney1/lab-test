<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Portal | The Laboratory Theater of Florida</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" async></script>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="button">Home</a>
        </nav>
        <h1>Volunteer Portal</h1>
        <div id="clerk-auth"></div>
    </header>

    <main id="portal-content" style="display:none;">
        <section id="shifts">
            <h2>Available Shifts</h2>
            <div id="shift-container" class="production-grid">
                <!-- Shifts will be injected here by JavaScript -->
                <p>Loading available shifts...</p>
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScyg_GztWg2sliQxQ8Etdq_RKIjIjrVHyjSx9IqMI_vPk_RbQ/viewform?embedded=true" width="640" height="837" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
            </div>
        </section>
    </main>

    <script>
        // Clerk Auth Logic
        window.addEventListener('load', async () => {
            const Clerk = window.Clerk;
            await Clerk.load();

            if (Clerk.user) {
                document.getElementById('portal-content').style.display = 'block';
                document.getElementById('clerk-auth').innerHTML = '<div id="user-button"></div>';
                Clerk.mountUserButton(document.getElementById('user-button'));
                loadShifts(); // Call function to load data
            } else {
                document.getElementById('clerk-auth').innerHTML = '<div id="sign-in"></div>';
                Clerk.mountSignIn(document.getElementById('sign-in'));
            }
        });

        function loadShifts() {
            // This is where we will fetch the data from your spreadsheet/database
            const container = document.getElementById('shift-container');
            container.innerHTML = `
                <div class="production-card">
                    <h3>Usher</h3>
                    <p>July 15, 2026 | 6:00 PM</p>
                    <button class="button">Sign Up</button>
                </div>
            `;
        }
    </script>
</body>
</html>
